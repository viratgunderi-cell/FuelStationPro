function saveLubeSale(productId) {
  const qty      = parseFloat(document.getElementById('ls_qty')?.value);
  const rate     = parseFloat(document.getElementById('ls_rate')?.value);
  const mode     = document.getElementById('ls_mode')?.value||'cash';
  const customer = (document.getElementById('ls_customer')?.value||'').trim();
  if (isNaN(qty)||qty<=0) { toast('Enter valid quantity','error'); return; }
  if (isNaN(rate)||rate<=0) { toast('Enter valid rate','error'); return; }
  const p = (window._lubesProducts||[]).find(x=>x.id===productId);
  if (!p) return;
  if (qty > p.stock) { toast(`Only ${p.stock} ${p.unit||''} in stock`,'error'); return; }
  const amount = +(qty * rate).toFixed(2);
  const now2 = new Date();
  if (!window._lubesSales) window._lubesSales = [];
  window._lubesSales.unshift({
    id: Date.now(), date: now2.toISOString().slice(0,10),
    time: now2.toTimeString().slice(0,5),
    productId, productName: p.name, qty, unit: p.unit||'',
    rate, amount, customer, mode,
    employee: APP.data?.employees?.find(e=>e.id===APP.empId)?.name || '',
  });
  p.stock = +(p.stock - qty).toFixed(3);
  lubes_save(); lubesSales_save();
  closeModal();
  auditLog('lube_sale', { product: p.name, qty, amount, mode, customer });
  toast(`✅ Sold ${qty} ${p.unit||''} ${p.name} — ${cur(amount)}`, 'success');
  // Low stock WA alert
  if (p.stock <= (p.minStock||5) && typeof wa_send === 'function' && wa_phone()) {
    wa_send(wa_phone(), `⚠️ LOW STOCK: ${p.name} — Only ${p.stock} ${p.unit||''} left. Please reorder.\n\n_— FuelBunk Pro_`, 'low_stock').catch(()=>{});
  }
  renderPage();
}
window.saveLubeSale = saveLubeSale;

    const perDay   = daysInMonth>0 ? (e.salary||0)/daysInMonth : 0;

    const advances = (window._advancesData||[]).filter(a=>a.empId===e.id&&!a.cleared);
    const advDeduct = advances.reduce((x,a)=>{ const emi=a.emi||Math.ceil(a.amount/(a.months||1)); return (a.paidMonths||0)<(a.months||1)?x+emi:x; },0);
    const net = Math.max(0,earned-advDeduct);
    setTimeout(()=>printPayslip(e.id,e.name,month,year,earned,advDeduct,net,present,absent,halfDay), i*300);
  });
}

function renderGSTTab(D) {
  const now4 = new Date();

  const monthName = new Date(gstYear, gstMonth-1).toLocaleString('en-IN',{month:'long'});
  const startDate = `${gstYear}-${String(gstMonth).padStart(2,'0')}-01`;

  const gstin     = D.gstin || '';

  // Collect all taxable supplies for the month
  const fuelSales = D.sales.filter(s => { const d=(s.date||'').slice(0,10); return d>=startDate&&d<=endDate; });
  const lubeSales = (window._lubesSales||[]).filter(s => s.date>=startDate&&s.date<=endDate);

  // Build GSTR-1 B2C summary by HSN+GST rate
  const gstSummary = {};
  const taxRates   = D.fuelTaxRates || [];

  fuelSales.forEach(s => {
    const tr = taxRates.find(t => t.fuelType === s.fuelType) || {};
    const gstPct = tr.rate ? parseFloat(tr.rate) : 0;
    const key = `${s.fuelType}-${gstPct}`;
    if (!gstSummary[key]) gstSummary[key] = { desc: getFuel(s.fuelType).name, hsn: '27101900', gstPct, taxable:0, cgst:0, sgst:0, total:0, txns:0 };
    // GST-exclusive taxable = amount / (1 + gstPct/100)
    const taxable = gstPct > 0 ? s.amount / (1 + gstPct/100) : s.amount;
    const gstAmt  = s.amount - taxable;
    gstSummary[key].taxable += taxable;
    gstSummary[key].cgst    += gstAmt/2;
    gstSummary[key].sgst    += gstAmt/2;
    gstSummary[key].total   += s.amount;
    gstSummary[key].txns    += 1;
  });

  lubeSales.forEach(s => {
    const prod = (window._lubesProducts||[]).find(p=>p.id===s.productId);
    const gstPct = prod?.gstPct || 18;

    const taxable = gstPct > 0 ? s.amount / (1 + gstPct/100) : s.amount;
    const gstAmt  = s.amount - taxable;
    gstSummary[key].taxable += taxable;
    gstSummary[key].cgst    += gstAmt/2;
    gstSummary[key].sgst    += gstAmt/2;
    gstSummary[key].total   += s.amount;
    gstSummary[key].txns    += 1;
  });

  const summaryItems = Object.values(gstSummary);
  const totalTaxable = summaryItems.reduce((a,x)=>a+x.taxable,0);

  </tr>`).join('') || `<tr><td colspan="9" style="text-align:center;padding:20px;color:var(--text-3)">No taxable sales for this period</td></tr>`;

  return `
    <div class="card card-pad mb-14" style="padding:12px 16px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <h4 class="fw-700" style="font-size:13px;color:var(--text-0);margin:0">🧾 GST Summary — ${monthName} ${gstYear}</h4>
        <div style="display:flex;gap:8px;margin-left:auto">
          <button onclick="window._gstMonth=window._gstMonth>1?window._gstMonth-1:12;if(window._gstMonth===12)window._gstYear=(window._gstYear||new Date().getFullYear())-1;renderPage()" style="background:var(--bg-0);border:1px solid var(--border);color:var(--text-2);border-radius:6px;padding:4px 10px;cursor:pointer">◀</button>
          <button onclick="window._gstMonth=window._gstMonth<12?window._gstMonth+1:1;if(window._gstMonth===1)window._gstYear=(window._gstYear||new Date().getFullYear())+1;renderPage()" style="background:var(--bg-0);border:1px solid var(--border);color:var(--text-2);border-radius:6px;padding:4px 10px;cursor:pointer">▶</button>
        </div>
      </div>
    </div>

    ${!gstin ? `<div style="padding:12px 16px;background:rgba(249,115,22,0.07);border:1px solid rgba(249,115,22,0.3);border-radius:8px;margin-bottom:14px;font-size:12px;color:var(--orange)">
      ⚠️ <strong>GSTIN not set.</strong> Add your GST number below for accurate export. <button class="btn btn-ghost btn-sm" onclick="openGSTINModal()" style="margin-left:8px">Set GSTIN</button>
    </div>` : ''}

    <div class="g g-auto-sm gap-12 mb-14">
      ${statCard('Taxable Value', cur(totalTaxable), 'excl. GST', '📋')}
      ${statCard('CGST', cur(totalCGST), 'central GST', '🏛️')}
      ${statCard('SGST', cur(totalSGST), 'state GST', '🏛️')}
      ${statCard('Total Tax', cur(totalGST), 'CGST + SGST', '🧾')}

    <div class="card mb-14">

      </table></div></div>
    </div>

    <div class="g g-2 gap-12">

    const key = `${s.fuelType}-${gstPct}`;
    if (!summary[key]) summary[key] = { desc: getFuel(s.fuelType).name, hsn:'27101900', gstPct, taxable:0, cgst:0, sgst:0, total:0, txns:0 };
    const taxable = gstPct>0 ? s.amount/(1+gstPct/100) : s.amount;
    const gstAmt  = s.amount - taxable;
    summary[key].taxable+=taxable; summary[key].cgst+=gstAmt/2; summary[key].sgst+=gstAmt/2; summary[key].total+=s.amount; summary[key].txns+=1;
  });
  lubeSales.forEach(s => {
    const prod = (window._lubesProducts||[]).find(p=>p.id===s.productId);
    const gstPct = prod?.gstPct||18; const hsn = prod?.hsn||'27101940';
    const key = `lube-${s.productId}-${gstPct}`;
    if (!summary[key]) summary[key] = { desc: s.productName||'Lube', hsn, gstPct, taxable:0, cgst:0, sgst:0, total:0, txns:0 };

    summary[key].taxable+=taxable; summary[key].cgst+=gstAmt/2; summary[key].sgst+=gstAmt/2; summary[key].total+=s.amount; summary[key].txns+=1;

}

function exportGSTR1JSON(month, year) {
  const D = APP.data;
  const items = _buildGSTSummaryItems(month, year);
  const monthName = new Date(year,month-1).toLocaleString('en-IN',{month:'long'});
  const gstin = D.gstin || 'NOT_SET';
  const fp    = String(month).padStart(2,'0') + year;
  const gstr1 = {
    gstin, fp,
    b2cs: items.map(x => ({
      sply_ty: 'INTRA',
      pos: D.stateCode || '29',
      typ: 'OE',
      txval: +x.taxable.toFixed(2),
      rt: x.gstPct,
      iamt: 0,
      camt: +x.cgst.toFixed(2),
      samt: +x.sgst.toFixed(2),
      csamt: 0,
    })),
    hsn: {
      data: items.map(x => ({
        num: 1,
        hsn_sc: x.hsn,
        desc: x.desc,
        uqc: 'LTR',
        cnt: x.txns,
        txval: +x.taxable.toFixed(2),
        rt: x.gstPct,
        iamt: 0,
        camt: +x.cgst.toFixed(2),
        samt: +x.sgst.toFixed(2),
        csamt: 0,
      })),
    },
    exp: [], nil: null, doc_issue: null,
  };
  const blob = new Blob([JSON.stringify(gstr1, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `GSTR1-${gstin}-${fp}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);

function exportTallyXML(month, year) {
  const D = APP.data;
  const startDate = `${year}-${String(month).padStart(2,'0')}-01`;
  const endDate   = new Date(year, month, 0).toISOString().slice(0,10);
  const fuelSales = D.sales.filter(s=>{ const d=(s.date||'').slice(0,10); return d>=startDate&&d<=endDate; });
  const lubeSales = (window._lubesSales||[]).filter(s=>s.date>=startDate&&s.date<=endDate);
  const stationName = D.legalName || D.upiName || APP.tenant?.name || 'Fuel Station';
  const taxRates = D.fuelTaxRates || [];
  const monthName = new Date(year,month-1).toLocaleString('en-IN',{month:'long'});

  function tallyDate(iso) {
    const [y,m,d] = iso.split('-');
    return `${d}-${m}-${y}`; // DD-MM-YYYY for Tally
  }

  let vouchers = '';

  // Fuel sales vouchers
  fuelSales.forEach(s => {
    const tr = taxRates.find(t=>t.fuelType===s.fuelType)||{};
    const gstPct = tr.rate ? parseFloat(tr.rate) : 0;
    const taxable = gstPct>0 ? s.amount/(1+gstPct/100) : s.amount;
    const gstAmt  = s.amount - taxable;
    const ledger  = getFuel(s.fuelType).name + ' Sales';
    const dateStr = tallyDate((s.date||startDate));
    const modeMap = {cash:'Cash',upi:'UPI',card:'Card/Bank',credit:'Sundry Debtors'};
    const drLedger = modeMap[s.mode] || 'Cash';
    vouchers += `<TALLYMESSAGE>
  <VOUCHER VCHTYPE="Sales" ACTION="Create">
    <DATE>${dateStr}</DATE>
    <VOUCHERTYPENAME>Sales</VOUCHERTYPENAME>
    <NARRATION>${sanitize(s.vehicle||'')}</NARRATION>
    <ALLLEDGERENTRIES.LIST>
      <LEDGERNAME>${drLedger}</LEDGERNAME>
      <ISDEEMEDPOSITIVE>Yes</ISDEEMEDPOSITIVE>
      <AMOUNT>-${s.amount.toFixed(2)}</AMOUNT>
    </ALLLEDGERENTRIES.LIST>
    <ALLLEDGERENTRIES.LIST>
      <LEDGERNAME>${ledger}</LEDGERNAME>
      <ISDEEMEDPOSITIVE>No</ISDEEMEDPOSITIVE>
      <AMOUNT>${taxable.toFixed(2)}</AMOUNT>
    </ALLLEDGERENTRIES.LIST>
    ${gstAmt>0?`<ALLLEDGERENTRIES.LIST>
      <LEDGERNAME>Output CGST</LEDGERNAME>
      <ISDEEMEDPOSITIVE>No</ISDEEMEDPOSITIVE>
      <AMOUNT>${(gstAmt/2).toFixed(2)}</AMOUNT>
    </ALLLEDGERENTRIES.LIST>
    <ALLLEDGERENTRIES.LIST>
      <LEDGERNAME>Output SGST</LEDGERNAME>
      <ISDEEMEDPOSITIVE>No</ISDEEMEDPOSITIVE>
      <AMOUNT>${(gstAmt/2).toFixed(2)}</AMOUNT>
    </ALLLEDGERENTRIES.LIST>`:''}
  </VOUCHER>
</TALLYMESSAGE>\n`;
  });

  // Lube sales vouchers
  lubeSales.forEach(s => {
    const prod = (window._lubesProducts||[]).find(p=>p.id===s.productId);
    const gstPct = prod?.gstPct||18;
    const taxable = gstPct>0 ? s.amount/(1+gstPct/100) : s.amount;
    const gstAmt  = s.amount - taxable;
    const dateStr = tallyDate(s.date||startDate);
    const drLedger = s.mode==='credit'?'Sundry Debtors':s.mode==='upi'?'UPI':s.mode==='card'?'Card/Bank':'Cash';
    vouchers += `<TALLYMESSAGE>
  <VOUCHER VCHTYPE="Sales" ACTION="Create">
    <DATE>${dateStr}</DATE>
    <VOUCHERTYPENAME>Sales</VOUCHERTYPENAME>
    <NARRATION>Lube sale: ${sanitize(s.productName||'')} to ${sanitize(s.customer||'Walk-in')}</NARRATION>
    <ALLLEDGERENTRIES.LIST>
      <LEDGERNAME>${drLedger}</LEDGERNAME>
      <ISDEEMEDPOSITIVE>Yes</ISDEEMEDPOSITIVE>
      <AMOUNT>-${s.amount.toFixed(2)}</AMOUNT>
    </ALLLEDGERENTRIES.LIST>
    <ALLLEDGERENTRIES.LIST>
      <LEDGERNAME>Lubes &amp; Products Sales</LEDGERNAME>
      <ISDEEMEDPOSITIVE>No</ISDEEMEDPOSITIVE>
      <AMOUNT>${taxable.toFixed(2)}</AMOUNT>
    </ALLLEDGERENTRIES.LIST>
    ${gstAmt>0?`<ALLLEDGERENTRIES.LIST>
      <LEDGERNAME>Output CGST</LEDGERNAME>
      <ISDEEMEDPOSITIVE>No</ISDEEMEDPOSITIVE>
      <AMOUNT>${(gstAmt/2).toFixed(2)}</AMOUNT>
    </ALLLEDGERENTRIES.LIST>
    <ALLLEDGERENTRIES.LIST>
      <LEDGERNAME>Output SGST</LEDGERNAME>
      <ISDEEMEDPOSITIVE>No</ISDEEMEDPOSITIVE>
      <AMOUNT>${(gstAmt/2).toFixed(2)}</AMOUNT>
    </ALLLEDGERENTRIES.LIST>`:''}
  </VOUCHER>
</TALLYMESSAGE>\n`;
  });

  const xml = `<?xml version="1.0" encoding="UTF-8"?>
<ENVELOPE>
  <HEADER>
    <TALLYREQUEST>Import Data</TALLYREQUEST>
  </HEADER>
  <BODY>
    <IMPORTDATA>
      <REQUESTDESC>
        <REPORTNAME>Vouchers</REPORTNAME>
        <STATICVARIABLES>
          <SVCURRENTCOMPANY>${sanitize(stationName)}</SVCURRENTCOMPANY>
        </STATICVARIABLES>
      </REQUESTDESC>
      <REQUESTDATA>
${vouchers}
      </REQUESTDATA>
    </IMPORTDATA>
  </BODY>
</ENVELOPE>`;

  const blob = new Blob([xml], {type:'application/xml'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `Tally-${monthName}-${year}.xml`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast(`Tally XML downloaded — ${fuelSales.length + lubeSales.length} vouchers`, 'success');
}
window.exportTallyXML = exportTallyXML;

const ROLE_PAGES = {

  Manager:    ['dashboard','tanks','pumps','sales','credit','staff','lubes','reports','analytics','settings'],
  Accountant: ['dashboard','finance','credit','exports','reports','analytics','lubes'],
  Cashier:    ['dashboard','tanks','pumps','sales','lubes'],
};

// Actions blocked per role (used by rbac_can())
const ROLE_BLOCKED_ACTIONS = {
  Owner:      [],
  Manager:    ['delete_employee','payroll_pay','reset_data','export_all','add_admin_user'],
  Accountant: ['delete_employee','payroll_pay','reset_data','add_admin_user','add_employee','edit_employee','save_prices','add_tank','delete_tank','add_pump','delete_pump'],
  Cashier:    ['delete_employee','payroll_pay','reset_data','add_admin_user','add_employee','edit_employee','save_prices','add_tank','delete_tank','add_pump','delete_pump','view_finance','view_payroll','view_staff','credit_edit','view_exports','view_analytics'],
};

function rbac_role() {
  return APP.adminUser?.role || 'Owner';
}

function rbac_can(action) {
  const blocked = ROLE_BLOCKED_ACTIONS[rbac_role()] || [];
  return !blocked.includes(action);
}

function rbac_pages() {
  const allowed = ROLE_PAGES[rbac_role()];
  return allowed === null ? PAGES.map(p => p.id) : (allowed || []);
}

function rbac_canPage(pageId) {
  return rbac_pages().includes(pageId);
}

function roleBadge(role) {
  const map = {
    Owner:      'badge-accent',
    Manager:    'badge-blue',
    Accountant: 'badge-purple',
    Cashier:    'badge-green',
  };
  return badge(role, map[role] || 'badge-blue');
}

function renderAnalyticsMonthly(D) {
  const now = new Date();
  // Build last 12 months
  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = d.toISOString().slice(0,7); // YYYY-MM
    const label = d.toLocaleString('en-IN', {month:'short', year:'2-digit'});
    months.push({ key, label });
  }

  const mData = months.map(m => {
    const sales = D.sales.filter(s => (s.date||'').slice(0,7) === m.key);
    const lubeSales = (window._lubesSales||[]).filter(s => (s.date||'').slice(0,7) === m.key);
    const expenses = D.expenses.filter(e => (e.date||'').slice(0,7) === m.key);
    const fuelCost = D.fuelPurchases.filter(p => (p.date||'').slice(0,7) === m.key).reduce((a,p)=>a+(p.total||0),0);
    const revenue = sales.reduce((a,s)=>a+s.amount,0) + lubeSales.reduce((a,s)=>a+s.amount,0);
    const opEx = expenses.reduce((a,e)=>a+e.amount,0);
    const netProfit = revenue - fuelCost - opEx;
    const txns = sales.length + lubeSales.length;
    const litres = sales.reduce((a,s)=>a+s.liters,0);
    return { ...m, revenue, fuelCost, opEx, netProfit, txns, litres };
  });

  const maxRev = Math.max(...mData.map(m=>m.revenue), 1);
  const barCols = mData.map(m => {
    const revPct = Math.round((m.revenue/maxRev)*100);
    const profPct = m.revenue > 0 ? Math.round((Math.max(0,m.netProfit)/maxRev)*100) : 0;
    const isCurrentMonth = m.key === now.toISOString().slice(0,7);
    return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;gap:2px" title="${m.label}: ${cur(m.revenue)} revenue, ${cur(m.netProfit)} profit">
      <div style="width:100%;height:80px;display:flex;align-items:flex-end;gap:1px">
        <div style="flex:1;height:${Math.max(revPct,2)}%;background:${isCurrentMonth?'var(--accent-light)':'var(--bg-3)'};border-radius:3px 3px 0 0;transition:height 0.3s"></div>
        <div style="flex:1;height:${Math.max(profPct,2)}%;background:${m.netProfit>0?'var(--green)':'var(--red)'};border-radius:3px 3px 0 0;transition:height 0.3s;opacity:0.85"></div>
      </div>
      <div style="font-size:9px;color:${isCurrentMonth?'var(--accent-light)':'var(--text-3)'};font-weight:${isCurrentMonth?'700':'400'};white-space:nowrap">${m.label}</div>
    </div>`;
  }).join('');

  const totalRev    = mData.reduce((a,m)=>a+m.revenue,0);
  const totalProfit = mData.reduce((a,m)=>a+m.netProfit,0);
  const totalTxns   = mData.reduce((a,m)=>a+m.txns,0);
  const totalLitres = mData.reduce((a,m)=>a+m.litres,0);
  const bestMonth   = mData.reduce((best,m)=>m.revenue>best.revenue?m:best, mData[0]);

  const tableRows = [...mData].reverse().map(m=>`<tr>
    <td class="fw-600">${m.label}</td>
    <td class="r mono fw-700" style="color:var(--green)">${cur(m.revenue)}</td>
    <td class="r mono" style="color:var(--red)">-${cur(m.fuelCost)}</td>
    <td class="r mono" style="color:var(--orange)">-${cur(m.opEx)}</td>
    <td class="r mono fw-700" style="color:${m.netProfit>=0?'var(--accent-light)':'var(--red)'}">${m.netProfit<0?'-':''}${cur(Math.abs(m.netProfit))}</td>
    <td class="r" style="font-size:11px">${m.txns}</td>
    <td class="r mono" style="font-size:11px">${m.litres.toFixed(0)} L</td>
  </tr>`).join('');

  return `
    <div class="g g-auto-sm gap-12 mb-16">
      ${statCard('12-Month Revenue', cur(totalRev), 'all sources', '💰')}
      ${statCard('Total Profit', cur(totalProfit), '12 months', totalProfit>=0?'📈':'📉')}
      ${statCard('Transactions', totalTxns, '12 months', '🔢')}
      ${statCard('Best Month', bestMonth?.label||'—', cur(bestMonth?.revenue||0), '🏆')}
    </div>
    <div class="card card-pad mb-16">
      <div class="flex-between mb-14">
        <h4 class="fw-700" style="font-size:13px;color:var(--text-0)">📊 Revenue vs Profit — Last 12 Months</h4>
        <div style="display:flex;gap:12px;font-size:11px;color:var(--text-3)">
          <span><span style="display:inline-block;width:10px;height:10px;background:var(--accent-light);border-radius:2px;margin-right:4px"></span>Revenue</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:var(--green);border-radius:2px;margin-right:4px"></span>Profit</span>
        </div>
      </div>
      <div style="display:flex;gap:2px;align-items:flex-end">${barCols}</div>
    </div>
    <div class="card mb-16">
      <div class="card-head"><h4>Monthly Breakdown</h4></div>
      <div class="card-body"><div class="tbl-wrap"><table>
        <thead><tr><th>Month</th><th class="r">Revenue</th><th class="r">Fuel Cost</th><th class="r">Op.Ex</th><th class="r">Net Profit</th><th class="r">Txns</th><th class="r">Litres</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table></div></div>
    </div>`;
}

function renderAnalyticsFuelPL(D) {
  const vFrom = window._plFrom || new Date(Date.now()-30*86400000).toISOString().slice(0,10);
  const vTo   = window._plTo   || new Date().toISOString().slice(0,10);

  const rows = FUEL_TYPES.map(f => {
    const sales = D.sales.filter(s => s.fuelType===f.id && (s.date||'').slice(0,10)>=vFrom && (s.date||'').slice(0,10)<=vTo);
    const litresSold = sales.reduce((a,s)=>a+s.liters,0);
    const revenue    = sales.reduce((a,s)=>a+s.amount,0);
    const avgSellRate = litresSold > 0 ? revenue/litresSold : (D.prices?.[f.id]||0);
    const buyRate     = D.purchasePrices?.[f.id] || 0;
    const margin      = avgSellRate - buyRate;
    const grossProfit = margin * litresSold;
    const marginPct   = avgSellRate > 0 ? (margin/avgSellRate)*100 : 0;
    const txns        = sales.length;

    // Payment mode split
    const byCash   = sales.filter(s=>s.mode==='cash').reduce((a,s)=>a+s.amount,0);
    const byUPI    = sales.filter(s=>s.mode==='upi').reduce((a,s)=>a+s.amount,0);
    const byCard   = sales.filter(s=>s.mode==='card').reduce((a,s)=>a+s.amount,0);
    const byCredit = sales.filter(s=>s.mode==='credit').reduce((a,s)=>a+s.amount,0);

    return { f, litresSold, revenue, avgSellRate, buyRate, margin, grossProfit, marginPct, txns, byCash, byUPI, byCard, byCredit };
  });

  const totalRev    = rows.reduce((a,r)=>a+r.revenue,0);
  const totalLitres = rows.reduce((a,r)=>a+r.litresSold,0);
  const totalGP     = rows.reduce((a,r)=>a+r.grossProfit,0);

  const cards = rows.map(r=>`<div class="card card-pad">
    <div class="flex-between mb-10">
      <div class="fw-800" style="color:${r.f.color};font-size:15px">${r.f.name}</div>
      ${r.litresSold > 0 ? badge(r.marginPct.toFixed(1)+'% margin', r.marginPct>=15?'badge-green':r.marginPct>=8?'badge-accent':'badge-red') : badge('No Sales','badge-red')}
    </div>
    <div class="g" style="grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">
      <div class="dbox text-center" style="padding:8px"><div class="mono fw-800" style="font-size:15px">${r.litresSold.toFixed(0)}</div><div style="font-size:10px;color:var(--text-3)">Litres Sold</div></div>
      <div class="dbox text-center" style="padding:8px"><div class="mono fw-800" style="font-size:15px;color:var(--green)">${cur(r.revenue)}</div><div style="font-size:10px;color:var(--text-3)">Revenue</div></div>
      <div class="dbox text-center" style="padding:8px"><div class="mono fw-800" style="font-size:15px;color:${r.grossProfit>=0?'var(--accent-light)':'var(--red)'}">${cur(r.grossProfit)}</div><div style="font-size:10px;color:var(--text-3)">Gross Profit</div></div>
    </div>
    <div style="font-size:11px;color:var(--text-3);margin-bottom:6px">Buy: <span class="mono fw-600">₹${r.buyRate.toFixed(2)}/L</span> · Sell avg: <span class="mono fw-600">₹${r.avgSellRate.toFixed(2)}/L</span> · Margin: <span class="mono fw-600" style="color:${r.margin>=0?'var(--green)':'var(--red)'}">₹${r.margin.toFixed(2)}/L</span></div>
    <div style="font-size:11px;color:var(--text-3)">
      💵 ${cur(r.byCash)} &nbsp;📱 ${cur(r.byUPI)} &nbsp;💳 ${cur(r.byCard)} &nbsp;🏢 ${cur(r.byCredit)} &nbsp;· ${r.txns} txns
    </div>
  </div>`).join('');

  return `
    <div class="card card-pad mb-14" style="padding:10px 14px">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <span class="fw-700" style="font-size:12px">Date Range:</span>
        <input type="date" class="form-input" style="width:auto;padding:5px 10px" value="${vFrom}" onchange="window._plFrom=this.value;renderPage()" />
        <span style="color:var(--text-3)">→</span>
        <input type="date" class="form-input" style="width:auto;padding:5px 10px" value="${vTo}" onchange="window._plTo=this.value;renderPage()" />
      </div>
    </div>
    <div class="g g-auto-sm gap-12 mb-16">
      ${statCard('Total Revenue', cur(totalRev), 'all fuel types', '💰')}
      ${statCard('Total Litres', totalLitres.toFixed(0)+' L', 'dispensed', '⛽')}
      ${statCard('Gross Profit', cur(totalGP), 'sell minus buy', totalGP>=0?'📈':'📉')}
    </div>
    <div class="g g-auto-lg gap-16">${cards}</div>`;
}

function renderAnalyticsTopCustomers(D) {
  const vFrom = window._tcFrom || new Date(Date.now()-30*86400000).toISOString().slice(0,10);
  const vTo   = window._tcTo   || new Date().toISOString().slice(0,10);

  // Aggregate by vehicle/customer across all sales
  const byVehicle = {};
  D.sales.filter(s=>(s.date||'').slice(0,10)>=vFrom&&(s.date||'').slice(0,10)<=vTo).forEach(s=>{
    const key = (s.vehicle||'').trim() || (s.customer||'').trim() || 'Walk-in';
    if (!byVehicle[key]) byVehicle[key] = { key, txns:0, litres:0, revenue:0, fuels:{} };
    byVehicle[key].txns++;
    byVehicle[key].litres += s.liters||0;
    byVehicle[key].revenue += s.amount||0;
    byVehicle[key].fuels[s.fuelType] = (byVehicle[key].fuels[s.fuelType]||0) + (s.liters||0);
  });

  const sorted = Object.values(byVehicle).sort((a,b)=>b.revenue-a.revenue).slice(0,20);
  const maxRev = sorted[0]?.revenue || 1;

  const rows = sorted.map((v,i)=>{
    const topFuel = Object.entries(v.fuels).sort((a,b)=>b[1]-a[1])[0];

// ── LOYALTY POINTS SYSTEM ────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════════
// Points: 1 point per ₹100 spent (configurable). Redemption: 100 pts = ₹50 discount.
// Stored on creditCustomer.loyaltyPoints, history in creditCustomer.loyaltyHistory

function loyalty_settings() {
  return {
    earnRate:  APP.data?.loyaltyEarnRate  || 1,    // points per ₹100
    redeemRate: APP.data?.loyaltyRedeemRate || 50, // ₹ value per 100 points
    minRedeem:  APP.data?.loyaltyMinRedeem || 100, // min points to redeem
  };
}

function loyalty_earnPoints(amountPaid) {
  const { earnRate } = loyalty_settings();
  return Math.floor((amountPaid / 100) * earnRate);
}

function loyalty_pointsToRupees(points) {
  const { redeemRate } = loyalty_settings();
  return Math.floor(points / 100) * redeemRate;
}

// Add points to a credit customer after sale
function loyalty_addPoints(customerId, amountPaid, saleRef) {
  const D = APP.data;
  const c = D.creditCustomers.find(x=>x.id===customerId);
  if (!c) return 0;
  const pts = loyalty_earnPoints(amountPaid);
  if (pts <= 0) return 0;
  c.loyaltyPoints = (c.loyaltyPoints||0) + pts;
  if (!c.loyaltyHistory) c.loyaltyHistory = [];
  c.loyaltyHistory.unshift({ type:'earn', pts, balance: c.loyaltyPoints, ref: saleRef||'', date: new Date().toISOString().slice(0,10) });
  db.put('creditCustomers', c).catch(()=>{});
  return pts;
}
window.loyalty_addPoints = loyalty_addPoints;

// Open redeem modal for a credit customer
function openLoyaltyRedeemModal(customerId) {
  const D = APP.data;
  const c = D.creditCustomers.find(x=>x.id===customerId);
  if (!c) return;
  const pts = c.loyaltyPoints || 0;
  const settings = loyalty_settings();
  const redeemable = Math.floor(pts / 100) * 100; // round down to nearest 100
  const rupeeVal   = loyalty_pointsToRupees(pts);
  if (pts < settings.minRedeem) {
    toast(`Minimum ${settings.minRedeem} points needed to redeem. Current: ${pts} pts`, 'error');
    return;
  }
  openModal(`⭐ Redeem Points — ${sanitize(c.name)}`, `
    <div style="text-align:center;padding:10px 0 16px">
      <div style="font-size:40px;margin-bottom:8px">⭐</div>
      <div class="mono fw-800" style="font-size:32px;color:var(--accent-light)">${pts.toLocaleString('en-IN')}</div>
      <div style="font-size:13px;color:var(--text-3)">Available Points</div>
    </div>
    <div style="padding:12px 14px;background:rgba(34,197,94,0.07);border-radius:8px;margin-bottom:16px;border:1px solid rgba(34,197,94,0.2)">
      <div class="flex-between">
        <span style="font-size:13px;color:var(--text-2)">Redeemable value</span>
        <span class="mono fw-800" style="color:var(--green);font-size:18px">${cur(rupeeVal)}</span>
      </div>
      <div style="font-size:11px;color:var(--text-3);margin-top:4px">Rate: ${settings.redeemRate} per 100 pts · Redeemable: ${redeemable} pts</div>
    </div>

      <label class="form-label">Points to Redeem</label>
      <input class="form-input" type="number" id="ly_pts" value="${redeemable}" min="100" max="${redeemable}" step="100"
        style="font-family:var(--mono);font-size:20px;font-weight:700"
        oninput="document.getElementById('ly_val').textContent=cur(Math.floor((+this.value||0)/100)*${settings.redeemRate})" />
    </div>
    <div style="text-align:center;font-size:12px;color:var(--text-3)">Value: <span id="ly_val" class="fw-700 mono" style="color:var(--green)">${cur(rupeeVal)}</span></div>
    <div class="form-group mt-12">
      <label class="form-label">Apply as discount to outstanding balance?</label>
      <select class="form-input" id="ly_apply">
        <option value="balance">Deduct from outstanding balance</option>
        <option value="note">Record redemption only (cash discount given)</option>
      </select>
    </div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-accent" onclick="saveLoyaltyRedeem(${customerId})">⭐ Redeem</button>`);
}
window.openLoyaltyRedeemModal = openLoyaltyRedeemModal;

async function saveLoyaltyRedeem(customerId) {
  const D = APP.data;
  const c = D.creditCustomers.find(x=>x.id===customerId);
  if (!c) return;
  const ptsToRedeem = parseInt(document.getElementById('ly_pts')?.value)||0;
  const applyMode   = document.getElementById('ly_apply')?.value||'balance';
  const settings    = loyalty_settings();
  if (ptsToRedeem < settings.minRedeem) { toast(`Minimum ${settings.minRedeem} points to redeem`,'error'); return; }
  if (ptsToRedeem % 100 !== 0)          { toast('Points must be in multiples of 100','error'); return; }
  if (ptsToRedeem > (c.loyaltyPoints||0)) { toast('Not enough points','error'); return; }
  const rupeeVal = Math.floor(ptsToRedeem/100) * settings.redeemRate;
  c.loyaltyPoints = (c.loyaltyPoints||0) - ptsToRedeem;
  if (!c.loyaltyHistory) c.loyaltyHistory = [];
  c.loyaltyHistory.unshift({ type:'redeem', pts:-ptsToRedeem, balance: c.loyaltyPoints, rupeeVal, mode: applyMode, date: new Date().toISOString().slice(0,10) });
  if (applyMode === 'balance' && c.outstanding >= rupeeVal) {
    c.outstanding = +(c.outstanding - rupeeVal).toFixed(2);
  }
  await db.put('creditCustomers', c).catch(()=>{});
  auditLog('loyalty_redeem', { customer: c.name, pts: ptsToRedeem, rupeeVal, applyMode });
  closeModal();
  toast(`⭐ ${ptsToRedeem} points redeemed for ${cur(rupeeVal)}!`, 'success');
  renderPage();
}
window.saveLoyaltyRedeem = saveLoyaltyRedeem;

async function saveAddAdminUser() {
  const name = (document.getElementById('au_name')?.value||'').trim();
  const user = (document.getElementById('au_user')?.value||'').trim().toLowerCase();
  const role = document.getElementById('au_role')?.value || 'Manager';
  const pass = document.getElementById('au_pass')?.value || '';
  if (!name || name.length < 2) { toast('Enter full name','error'); return; }
  if (!user || user.length < 2) { toast('Enter username','error'); return; }
  if (pass.length < 6) { toast('Password must be at least 6 characters','error'); return; }
  // Use AuthAPI if available (server), else update local tenant
  if (typeof AuthAPI !== 'undefined') {
    try {
      await AuthAPI.addAdminUser({ name, username: user, role, password: pass });
      toast(`${name} added as ${role}`, 'success');
      closeModal(); renderPage();
    } catch(e) { toast(e.message||'Failed to add user','error'); }
  } else {
    // Fallback: update local tenant object
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
    const passHash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if (!APP.tenant) { toast('No station data — cannot add user offline','error'); return; }
    if (!(APP.tenant.adminUsers||[]).find) APP.tenant.adminUsers = [];
    if (APP.tenant.adminUsers.find(u=>u.username===user)) { toast('Username already exists','error'); return; }
    APP.tenant.adminUsers.push({ id: Date.now(), name, username: user, passHash, role });
    toast(`${name} added as ${role}`, 'success');
    closeModal(); renderPage();
  }
}
window.saveAddAdminUser = saveAddAdminUser;

function navigate(pageId) {

    toast('Access restricted for your role', 'error');
    return;
  }
  APP.page = pageId;

  document.getElementById('pageTitle').textContent = PAGES.find(p => p.id === pageId)?.label || 'Dashboard';

function buildNav() {
  const groups = { main: 'Operations', finance: 'Finance', employee: 'Employee', reports: 'Reports' };
  let html = '';
  let lastGroup = '';
  const allowedPages = (APP.loggedIn && APP.role === 'admin') ? rbac_pages() : PAGES.map(p=>p.id);
  PAGES.filter(p => allowedPages.includes(p.id)).forEach(p => {
    if (p.group !== lastGroup) {
      html += `<div class="nav-group-label">${groups[p.group]}</div>`;
      lastGroup = p.group;
    }
    html += `<button class="nav-btn ${p.id === APP.page ? 'active' : ''}" onclick="navigate('${p.id}')">
      <span class="nav-icon">${p.icon}</span><span class="nav-label">${p.label}</span>

// ── RENDER ───────────────────────────────────────────────────
function renderPage() {
  const D = APP.data;
  const el = document.getElementById('content');
  if (!el) { console.error('No #content element'); return; }
  el.className = 'content';

  // Guard: if data not loaded yet, show loading state
  if (!D && APP.page !== 'employee') {
    el.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-3)"><div style="font-size:40px;margin-bottom:16px">⏳</div><div class="fw-700">Loading data...</div><div style="font-size:12px;margin-top:8px">If this persists, try refreshing the page.</div></div>';
    return;
  }

  // Dashboard: auto-refresh sales + tank data to pick up employee submissions
  if (APP.page === 'dashboard' && APP.role === 'admin') {
    setTimeout(function() {
      Promise.all([
        db.getAll('sales'),
        db.getAll('tanks'),
      ]).then(function(results) {
        var freshSales = results[0], freshTanks = results[1];
        var changed = false;
        if (freshSales.length !== (APP.data.sales || []).length) { APP.data.sales = freshSales.sort((a,b)=>b.id-a.id); changed = true; }
        if (freshTanks.length) { APP.data.tanks = freshTanks.map(_normTank); changed = true; }
        if (changed) {
          var el2 = document.getElementById('content');
          if (el2 && APP.page === 'dashboard') try { el2.innerHTML = renderDashboard(APP.data); } catch(e) {}
        }
      }).catch(() => {});
    }, 500);
  }

  // Tanks page: do a quick async refresh to pick up any external changes
  // but only AFTER initial render to avoid layout flash
  if (APP.page === 'tanks' && APP.role === 'admin') {
    setTimeout(function() {
      db.getAll('tanks').then(function(freshTanks) {
        if (freshTanks.length) {
          // Normalize server response: current_level → current
          freshTanks = freshTanks.map(_normTank);
          var changed = freshTanks.some(function(ft) {
            var existing = APP.data.tanks.find(function(t) { return String(t.id) === String(ft.id); });
            return !existing || existing.current !== ft.current;
          });
          if (changed) {
            APP.data.tanks = freshTanks;
            var el2 = document.getElementById('content');
            if (el2 && APP.page === 'tanks') try { el2.innerHTML = renderTanks(APP.data); } catch(e) {}
          }
        }
      }).catch(function() {});
    }, 500);
  }

  try {
    let html = '';
    switch (APP.page) {
      case 'dashboard': html = renderDashboard(D); break;
      case 'tanks': html = renderTanks(D); break;
      case 'pumps': html = renderPumps(D); break;
      case 'sales': html = renderSales(D, APP.salesFilter); break;
      case 'credit': html = renderCredit(D); break;
      case 'staff': html = renderStaff(D); break;
      case 'payroll': html = renderPayroll(D); break;
      case 'finance': html = renderFinance(D); break;
      case 'lubes': html = renderLubes(D); break;
      case 'exports': html = renderExports(D); break;
      case 'reports': html = renderReports(D); break;
      case 'analytics': html = renderAnalytics(D); break;
      case 'employee': html = renderEmployeePortal(); break;
      case 'settings': html = renderSettings(D); break;
      default: html = renderDashboard(D);
    }
    if (!html || html.trim().length === 0) {
      el.innerHTML = '<div style="padding:40px;color:var(--text-2);text-align:center"><p>⚠️ Page "' + APP.page + '" returned empty content.</p><p style="font-size:11px;margin-top:8px">Data keys: ' + (D ? Object.keys(D).join(', ') : 'null') + '</p><p style="font-size:11px">Tanks: ' + (D?.tanks?.length || 0) + ', Sales: ' + (D?.sales?.length || 0) + '</p></div>';
    } else {
      el.innerHTML = html;
    }
  } catch (err) {
    console.error('Render error on page "' + APP.page + '":', err);
    el.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-3)"><div style="font-size:40px;margin-bottom:16px">⚠️</div><div class="fw-700" style="color:var(--red)">Render Error</div><div style="font-size:12px;margin-top:8px;color:var(--text-2)">' + sanitize(String(err.message || err)) + '</div><button class="btn btn-accent mt-16" onclick="location.reload()">🔄 Reload App</button></div>';
  }
}

      </select></div>
    </div>
    <div class="form-group"><label class="form-label">Customer (for credit)</label><input class="form-input" id="saleCustomer" placeholder="Optional" /></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-accent" onclick="saveSale()">💾 Save Sale</button>`);
}

function calcSaleAmount() {
  const fuelId = document.getElementById('saleFuel').value;
  const liters = parseFloat(document.getElementById('saleLiters').value) || 0;
  document.getElementById('saleAmount').value = (liters * (APP.data.prices[fuelId] || 0)).toFixed(2);
}

async function saveSale() {
  const fuelType = document.getElementById('saleFuel').value;
  const liters = parseFloat(document.getElementById('saleLiters').value);
  const amount = parseFloat(document.getElementById('saleAmount').value);
  const vehicle = (document.getElementById('saleVehicle').value || '').toUpperCase().trim();
  const mode = document.getElementById('saleMode').value;
  const pump = String(document.getElementById('salePump').value);   // pump.id is TEXT in DB — keep as string
  const customer = (document.getElementById('saleCustomer')?.value || '').trim();

  const errors = validateSaleInput(fuelType, liters, amount, vehicle, APP.data.prices);
  if (errors.length > 0) { toast(errors[0], 'error'); return; }

  const sale = {
    id: Date.now(), date: today(), time: now(), fuelType, liters, amount,
    mode, pump, vehicle: sanitize(vehicle),
    customer: customer ? sanitize(customer) : undefined, shift: 'Current'
  };

  if (mode === 'upi') {
    closeModal();
    openUPIPaymentModal(amount, fuelType, liters, async (txnId) => {
      sale.upiTxnId = txnId || null;
      APP.data.sales.unshift(sale);
      try { await db.add('sales', sale); } catch(e) { console.warn('[Sale]', e.message); }
      const tank = APP.data.tanks.find(t => t.fuelType === fuelType);
      if (tank) {
        tank.current = Math.max(0, (tank.current || 0) - liters);
        try { await db.put('tanks', _tankForPut(tank)); } catch(e) { console.warn('[Tank]', e.message); }
      }
      const pumpData = APP.data.pumps.find(p => String(p.id) === String(pump));
      if (pumpData) {
        pumpData.currentReading = (pumpData.currentReading || 0) + liters;
        try { await db.put('pumps', _pumpForPut(pumpData)); } catch(e) { console.warn('[Pump]', e.message); }
      }
      if (mode === 'credit' && customer) {
        const cust = APP.data.creditCustomers.find(c => c.name === customer);
        if (cust) { cust.outstanding = (cust.outstanding || 0) + amount; try { await db.put('creditCustomers', cust); } catch(e) {} }
      }
      auditLog('sale_add', { fuelType, liters, amount, vehicle, mode: 'upi', pump, upiTxnId: txnId });
      toast(`✅ Sale + UPI recorded: ${fmt(liters)}L — ${cur(amount)}`, 'success');
      renderPage();
    });
    return;
  }

  APP.data.sales.unshift(sale);
  try { await db.add('sales', sale); } catch(e) { console.warn('[Sale]', e.message); }

  // Update tank level — ONCE only (was deducting twice before)
  const tank = APP.data.tanks.find(t => t.fuelType === fuelType);
  if (tank) {
    tank.current = Math.max(0, (tank.current || 0) - liters);
    try { await db.put('tanks', _tankForPut(tank)); } catch(e) { console.warn('[Tank]', e.message); }
  }

  // Update pump reading
  const pumpData = APP.data.pumps.find(p => String(p.id) === String(pump));
  if (pumpData) {
    pumpData.currentReading = (pumpData.currentReading || 0) + liters;
    try { await db.put('pumps', _pumpForPut(pumpData)); } catch(e) { console.warn('[Pump]', e.message); }
  }

  // Credit sale: update customer outstanding + earn loyalty points
  if (mode === 'credit' && customer) {
    const cust = APP.data.creditCustomers.find(c => c.name === customer);
    if (cust) {
      cust.outstanding = (cust.outstanding || 0) + amount;
      try { await db.put('creditCustomers', cust); } catch(e) { console.warn('[Credit]', e.message); }
      // Award loyalty points
      const ptsEarned = loyalty_addPoints(cust.id, amount, `Sale ${fuelType} ${fmt(liters)}L`);
      if (ptsEarned > 0) toast(`⭐ ${ptsEarned} loyalty points added to ${sanitize(customer)}`, 'info');
    }
  }

  auditLog('sale_add', { fuelType, liters, amount, vehicle, mode, pump, customer: customer || undefined });
  closeModal();
  toast(`Sale recorded: ${fmt(liters)}L ${getFuel(fuelType).short} — ${cur(amount)}`, 'success');
  renderPage();
}

function selectTankCap(selected) {
  TANK_CAPACITIES.forEach(c => {
    const el = document.getElementById('capOpt_' + c);
    const val = document.getElementById('capOptVal_' + c);
    if (!el) return;
    const isSelected = c === selected;
    el.style.borderColor = isSelected ? 'var(--accent)' : 'var(--border)';
    el.style.background = isSelected ? 'rgba(212,148,15,0.1)' : 'var(--bg-0)';
    if (val) val.style.color = isSelected ? 'var(--accent-light)' : 'var(--text-1)';
    // Update radio
    const radio = document.querySelector(`input[name="newTankCapR"][value="${c}"]`);
    if (radio) radio.checked = isSelected;
  });
}

function updateTankFuelPreview() {
  const sel = document.querySelector('input[name="newTankFuelR"]:checked')?.value;
  FUEL_TYPES.forEach(f => {
    const el = document.getElementById('fuelOpt_' + f.id);
    const lbl = document.getElementById('fuelOptLabel_' + f.id);
    if (!el) return;
    const isSelected = f.id === sel;
    el.style.borderColor = isSelected ? f.color : 'var(--border)';
    el.style.background = isSelected ? f.color + '18' : 'var(--bg-0)';
    if (lbl) lbl.style.color = isSelected ? f.color : 'var(--text-2)';
  });
}

async function saveNewTank() {
  const fuelType = document.querySelector('input[name="newTankFuelR"]:checked')?.value;
  const capacity = parseInt(document.querySelector('input[name="newTankCapR"]:checked')?.value || '0');
  const current  = parseFloat(document.getElementById('newTankCurrent')?.value) || 0;

  if (!fuelType) { toast('Select a fuel type', 'error'); return; }
  if (!capacity) { toast('Select capacity', 'error'); return; }
  if (current > capacity) { toast(`Current level (${fmt(current)}L) cannot exceed capacity (${fmt(capacity)}L)`, 'error'); return; }

  try {
    const tanks = await db.getAll('tanks');
    const newId = tanks.length > 0 ? Math.max(...tanks.map(t => t.id)) + 1 : 1;
    const newTank = {
      id: newId,
      fuelType,
      capacity,
      current,
      lastDip: new Date().toISOString().split('T')[0]
    };
    await db.put('tanks', _tankForPut(newTank));
    const freshNew = await db.getAll('tanks');
    APP.data.tanks = freshNew.map(_normTank);
    closeModal();
    toast(`Tank ${newId} (${getFuel(fuelType).short}, ${fmt(capacity)}L) added`, 'success');
    renderPage();
  } catch(e) {
    // Fallback: update in-memory only
    const tanks = APP.data.tanks;
    const newId = tanks.length > 0 ? Math.max(...tanks.map(t => t.id)) + 1 : 1;
    APP.data.tanks.push({ id: newId, fuelType, capacity, current, lastDip: new Date().toISOString().split('T')[0] });
    closeModal();
    toast(`Tank ${newId} added`, 'success');
    renderPage();
  }
}

async function saveEditTank(tankId) {
  const fuelType = document.querySelector('input[name="editTankFuelR"]:checked')?.value;
  const capacity = parseInt(document.querySelector('input[name="editTankCapR"]:checked')?.value || '0');
  const current  = parseFloat(document.getElementById('editTankCurrent')?.value) || 0;

  if (!fuelType) { toast('Select a fuel type', 'error'); return; }
  if (!capacity) { toast('Select capacity', 'error'); return; }
  if (current > capacity) { toast(`Current level (${fmt(current)}L) exceeds new capacity (${fmt(capacity)}L). Reduce current level first.`, 'error'); return; }

  const updatedTank = { id: parseInt(tankId), fuelType, capacity, current, lastDip: APP.data.tanks.find(t=>parseInt(t.id)===parseInt(tankId))?.lastDip || '' };

  try {
    await db.put('tanks', _tankForPut(updatedTank));
    const freshEdited = await db.getAll('tanks');
    APP.data.tanks = freshEdited.map(_normTank);
  } catch(e) {
    const idx = APP.data.tanks.findIndex(t => parseInt(t.id) === parseInt(tankId));
    if (idx >= 0) APP.data.tanks[idx] = _normTank(updatedTank);
  }
  closeModal();
  toast(`Tank ${tankId} updated — ${getFuel(fuelType).short}, ${fmt(capacity)}L capacity`, 'success');
  renderPage();
}

function confirmDeleteTank(tankId) {
  const tank = APP.data.tanks.find(t => parseInt(t.id) === parseInt(tankId));
  if (!tank) return;
  const fuel = getFuel(tank.fuelType);
  openModal('🗑 Delete Tank',
    `<div style="text-align:center;padding:10px 0">
       <div style="font-size:40px;margin-bottom:12px">⚠️</div>
       <div style="font-size:15px;font-weight:700;color:var(--text-0);margin-bottom:8px">Delete Tank ${tankId}?</div>
       <div style="font-size:13px;color:var(--text-2);line-height:1.6">
         <strong style="color:${fuel.color}">${fuel.name}</strong> · ${fmt(tank.capacity)}L capacity<br>
         Current stock: <strong>${fmt(tank.current)}L</strong><br><br>
         <span style="color:var(--red)">This will also delete all dip readings for this tank.</span>
       </div>
     </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-red" onclick="deleteTank(${tankId})">🗑 Delete Tank</button>`
  );
}

async function deleteTank(tankId) {
  try {
    await db.delete('tanks', tankId);
    const tid = parseInt(tankId);
    const freshDeleted = await db.getAll('tanks');
    APP.data.tanks = freshDeleted.map(_normTank);
    APP.data.dipReadings = (APP.data.dipReadings || []).filter(d => parseInt(d.tankId) !== tid);
  } catch(e) {
    const tid = parseInt(tankId);
    APP.data.tanks = APP.data.tanks.filter(t => parseInt(t.id) !== tid);
    APP.data.dipReadings = (APP.data.dipReadings || []).filter(d => parseInt(d.tankId) !== tid);
  }
  closeModal();
  toast(`Tank ${tankId} deleted`, 'success');
  renderPage();
}

// ── DIP CHART HELPER ─────────────────────────────────────────
// Returns: '10K' | '20K' | null
// ── Normalize a tank object from server (fixes type mismatches) ──
function _normTank(t) {
  if (!t) return t;
  t.id       = parseInt(t.id)       || 0;
  t.capacity = parseInt(t.capacity) || 0;
  t.current  = parseFloat(t.current  !== undefined ? t.current  : (t.current_level  || 0));
  t.fuelType = t.fuelType || t.fuel_type || '';
  t.lowAlert = parseFloat(t.lowAlert !== undefined ? t.lowAlert : (t.low_alert || 500));
  t.lastDip  = t.lastDip || t.last_dip || '';
  return t;
}

// Strip snake_case duplicate fields before PUT — prevents old snake_case from
// overwriting the correctly aliased camelCase value in upsertRow
function _tankForPut(t) {
  return {
    id:       t.id,
    fuelType: t.fuelType,
    capacity: t.capacity,
    current:  t.current,
    lowAlert: t.lowAlert,
    lastDip:  t.lastDip,
    name:     t.name || '',
    unit:     t.unit || 'L',
  };
}

// Normalize a pump object from server
function _normPump(p) {
  if (!p) return p;
  p.id            = String(p.id);
  p.currentReading= parseFloat(p.currentReading !== undefined ? p.currentReading : (p.current_reading || 0));
  p.fuelType      = p.fuelType  || p.fuel_type  || '';
  p.tankId        = p.tankId    || p.tank_id    || '';
  p.nozzles       = parseInt(p.nozzles) || 2;
  // Derive openReading from nozzleOpen sum (more accurate than stored aggregate)
  const nozzleOpenMap = p.nozzleOpen || {};
  const nozzleOpenSum = Object.values(nozzleOpenMap).reduce((a, v) => a + (parseFloat(v)||0), 0);
  p.openReading   = nozzleOpenSum > 0 ? nozzleOpenSum
                  : parseFloat(p.openReading !== undefined ? p.openReading : (p.open_reading || 0));
  return p;
}

// Strip snake_case duplicates before PUT to prevent upsertRow overwrite bug
function _pumpForPut(p) {
  return {
    id:             p.id,
    name:           p.name    || '',
    fuelType:       p.fuelType || '',
    tankId:         p.tankId   || '',
    nozzles:        p.nozzles  || 2,
    currentReading: p.currentReading || 0,
    openReading:    p.openReading    || 0,
    status:         p.status  || 'active',
    nozzleReadings: p.nozzleReadings || {},
    nozzleOpen:     p.nozzleOpen     || {},
    nozzleFuels:    p.nozzleFuels    || {},
    nozzleLabels:   p.nozzleLabels   || {},
  };
}

function _tankChartType(tank) {
  if (!tank) return null;
  const cap = parseInt(tank.capacity);
  if (cap === 10000) return '10K';
  if (cap === 20000) return '20K';
  return null;
}

function _chartLabel(type) {
  if (type === '10K') return '📊 IOCL 10,000L Chart (1–194 cm)';
  if (type === '20K') return '📊 IOCL 20,000L Chart (1–210 cm)';
  return null;
}

function _cmRange(type) {
  if (type === '10K') return { min: 1, max: 194, placeholder: 'e.g. 87' };
  if (type === '20K') return { min: 1, max: 210, placeholder: 'e.g. 105' };
  return null;
}

function onDipTankChange() {
  const tankId = parseInt(document.getElementById('dipTank')?.value);
  const tank = APP.data.tanks.find(t => parseInt(t.id) === tankId);
  const ct = _tankChartType(tank);
  const useChart = !!ct;
  const cmR = _cmRange(ct) || { min:1, max:999 };

  const chartSec = document.getElementById('dipChartSection');
  const directSec = document.getElementById('dipDirectSection');
  const labelEl = document.getElementById('dipChartLabel');
  const cmRangeEl = document.getElementById('dipCmRange');
  const cmInput = document.getElementById('dipCm');

  if (chartSec) chartSec.style.display = useChart ? '' : 'none';
  if (directSec) directSec.style.display = useChart ? 'none' : '';
  if (labelEl) labelEl.textContent = _chartLabel(ct) || '';
  if (cmRangeEl) cmRangeEl.textContent = `(${cmR.min}–${cmR.max})`;
  if (cmInput) { cmInput.min = cmR.min; cmInput.max = cmR.max; cmInput.value = ''; }

  const preview = document.getElementById('dipCalcPreview');
  if (preview) preview.style.display = 'none';

  // Full 1-210cm coverage — no below-range elements needed
}

function updateDipPreview() {
  const cm = parseInt(document.getElementById('dipCm')?.value);
  const mm = parseInt(document.getElementById('dipMm')?.value) || 0;
  const preview = document.getElementById('dipCalcPreview');
  const volEl   = document.getElementById('dipCalcVol');
  const fmlaEl  = document.getElementById('dipCalcFormula');
  const pctEl   = document.getElementById('dipCalcPct');
  const barEl   = document.getElementById('dipCalcBar');


  if (!preview || !volEl) return;

  const tankId = parseInt(document.getElementById('dipTank')?.value);
  const tank = APP.data.tanks.find(t => parseInt(t.id) === tankId);
  const ct = _tankChartType(tank);
  const capacity = parseInt(tank?.capacity) || 10000;

  if (!cm || isNaN(cm)) { preview.style.display = 'none'; return; }

  let row = null, total = null;

  if (ct === '10K') {
    if (cm < 1 || cm > 194) { preview.style.display = 'none'; return; }
    row = IOCL_DIP_10K[cm];
  } else if (ct === '20K') {
    // Show below-range notice if cm < 127
    if (cm < IOCL_20K_MIN_CM) {
        preview.style.display = 'none';
      return;
    }
    if (cm > IOCL_20K_MAX_CM) { preview.style.display = 'none'; return; }
    row = IOCL_DIP_20K[cm];
  }

  if (!row) { preview.style.display = 'none'; return; }

  const mmAdd = mm > 0 && row.diff ? mm * row.diff : 0;
  total = Math.round((row.vol + mmAdd) * 100) / 100;

  const pct = Math.min(100, Math.round(total / capacity * 100));
  const barCol = pct < 20 ? 'var(--red)' : pct < 40 ? '#f97316' : 'var(--green)';

  volEl.textContent = total.toLocaleString('en-IN', { maximumFractionDigits: 2 });
  fmlaEl.innerHTML = mm > 0 && row.diff
    ? `${cm}cm = ${row.vol}L + ${mm}mm × ${row.diff} L/mm = <strong>+${mmAdd.toFixed(2)}L</strong>`
    : `${cm}cm → ${row.vol}L (IOCL ${ct} chart)`;
  pctEl.textContent = pct + '% full';
  pctEl.style.background = pct < 20 ? 'rgba(239,68,68,0.12)' : pct < 40 ? 'rgba(249,115,22,0.12)' : 'rgba(34,197,94,0.12)';
  pctEl.style.color = barCol;
  barEl.style.width = pct + '%';
  barEl.style.background = barCol;
  preview.style.display = '';
}

async function saveDip() {
  const tankId = parseInt(document.getElementById('dipTank').value);
  const tank = APP.data.tanks.find(t => parseInt(t.id) === tankId);
  const ct = _tankChartType(tank);

  let reading;
  let method = 'direct';

  if (ct === '10K') {
    const cm = parseInt(document.getElementById('dipCm')?.value);
    const mm = parseInt(document.getElementById('dipMm')?.value) || 0;
    if (!cm || cm < 1 || cm > 194) { toast('Enter dip reading in cm (1–194)', 'error'); return; }
    reading = ioclDipToLiters(cm, mm);
    method = 'iocl_10k';

  } else if (ct === '20K') {
    const cm = parseInt(document.getElementById('dipCm')?.value);
    const mm = parseInt(document.getElementById('dipMm')?.value) || 0;
    if (!cm || cm < 1 || cm > 210) { toast('Enter dip reading in cm (1–210)', 'error'); return; }
    const result = ioclDipToLiters20K(cm, mm);
    if (result === null) { toast(`Chart data not available for ${cm}cm`, 'error'); return; }
    reading = result;
    method = 'iocl_20k';

  } else {
    reading = parseFloat(document.getElementById('dipReading')?.value);
    if (isNaN(reading) || reading < 0) { toast('Enter valid dip reading', 'error'); return; }
    if (tank && reading > parseInt(tank.capacity)) { toast('Reading exceeds tank capacity (' + fmt(tank.capacity) + 'L)', 'error'); return; }
  }

  const tankCap = parseInt(tank?.capacity) || 99999;
  if (reading > tankCap * 1.15) {
    toast('Reading seems too high — check dip measurement', 'error'); return;
  }

  const dip = {
    id: Date.now(), date: today(), time: now(),
    tankId, reading,
    calculated: tank ? tank.current : reading,
    method
  };
  APP.data.dipReadings.unshift(dip);
  try { await db.add('dipReadings', dip); } catch(e) { console.warn('[Dip]', e.message); }
  if (tank) {
    tank.current = reading;
    tank.lastDip = today() + ' ' + now();
    try {
      await db.put('tanks', _tankForPut(tank));
      // Reload tanks from server to confirm persistence
      const freshTanks = await db.getAll('tanks');
      if (freshTanks && freshTanks.length) APP.data.tanks = freshTanks.map(_normTank);
    } catch(e) { console.warn('[Tank dip]', e.message); }
  }
  auditLog('dip_reading', { tankId, reading, method });
  closeModal();
  toast(`✅ Tank ${tankId} — Available Qty set to ${reading.toLocaleString('en-IN', {maximumFractionDigits:1})} L`, 'success');
  renderPage();
}

// Toggle fuel row visibility when checkbox ticked/unticked
function expToggleFuel(fuelId) {
  const checked = document.getElementById('taxChk_' + fuelId)?.checked;
  const row  = document.getElementById('taxRow_' + fuelId);
  const wrap = document.getElementById('taxChkWrap_' + fuelId);
  if (row) row.style.display = checked ? 'block' : 'none';
  if (wrap) {
    const colors = { petrol: '#ef4444', diesel: '#f97316', premium_petrol: '#a855f7' };
    wrap.style.borderColor = checked ? (colors[fuelId] || 'var(--accent)') : 'var(--border)';
  }
  if (!checked && row) {
    // Clear inputs when unchecked
    const saleEl = document.getElementById('taxSale_' + fuelId);
    const amtEl  = document.getElementById('taxAmt_' + fuelId);
    if (saleEl) saleEl.value = '';
    if (amtEl)  amtEl.value  = '';
  }
  expCalcTax();
}

function expCategoryChanged() {
  const cat = document.getElementById('expCategory')?.value || '';
  const taxBlock = document.getElementById('expTaxBlock');
  const gstBlock = document.getElementById('expGSTBlock');
  const amtInput = document.getElementById('expAmount');
  const isTax = cat === 'Local Sales Tax (Bill)';
  const isGST = cat === 'GST — Lube / Lubricants';
  taxBlock.style.display = isTax ? 'block' : 'none';
  gstBlock.style.display  = isGST  ? 'block'  : 'none';
  // Amount field: readonly & auto-filled for tax/GST, manual for others
  amtInput.readOnly = isTax || isGST;
  amtInput.style.background = (isTax || isGST) ? 'var(--bg-2)' : '';
  if (!(isTax || isGST)) amtInput.value = '';
}

function expCalcTax() {
  const fuels = ['petrol', 'diesel', 'premium_petrol'];
  let totalSales = 0, totalTax = 0;
  let anyChecked = false;
  fuels.forEach(f => {
    const chk  = document.getElementById('taxChk_' + f);
    if (!chk?.checked) return;
    anyChecked = true;
    const sale = parseFloat(document.getElementById('taxSale_' + f)?.value) || 0;
    const rate = parseFloat(document.getElementById('taxRate_' + f)?.value) || 0;
    const tax  = sale * rate / 100;
    const amtEl = document.getElementById('taxAmt_' + f);
    if (amtEl) amtEl.value = tax > 0 ? '₹' + tax.toFixed(2) : '';
    totalSales += sale;
    totalTax   += tax;
  });
  const summary = document.getElementById('expTaxSummary');
  if (anyChecked && totalTax > 0) {
    document.getElementById('taxTotalSales').textContent  = '₹' + totalSales.toFixed(2);
    document.getElementById('taxTotalPayable').textContent = '₹' + totalTax.toFixed(2);
    summary.style.display = 'block';
  } else {
    summary.style.display = 'none';
  }
  const amtEl = document.getElementById('expAmount');
  if (amtEl) amtEl.value = totalTax > 0 ? totalTax.toFixed(2) : '';
}

function expCalcGST() {
  const invoice = parseFloat(document.getElementById('expGSTInvoice')?.value) || 0;
  const rateSel = document.getElementById('expGSTRate')?.value;
  const customInput = document.getElementById('expGSTCustomRate');
  customInput.style.display = rateSel === 'custom' ? 'block' : 'none';
  const rate = rateSel === 'custom'
    ? (parseFloat(customInput?.value) || 0)
    : parseFloat(rateSel) || 0;
  const summary = document.getElementById('expGSTSummary');
  if (invoice <= 0 || rate <= 0) { summary.style.display = 'none'; document.getElementById('expAmount').value = ''; return; }
  const base   = invoice / (1 + rate / 100);
  const gstAmt = invoice - base;
  const half   = gstAmt / 2;
  document.getElementById('expGSTBase').textContent  = '₹' + base.toFixed(2);
  document.getElementById('expCGST').textContent     = '₹' + half.toFixed(2);
  document.getElementById('expSGST').textContent     = '₹' + half.toFixed(2);
  document.getElementById('expGSTTotal').textContent = '₹' + gstAmt.toFixed(2);
  summary.style.display = 'block';
  document.getElementById('expAmount').value = gstAmt.toFixed(2);
}

async function saveExpense() {
  const category = document.getElementById('expCategory').value;
  const amount   = parseFloat(document.getElementById('expAmount').value);
  const desc     = (document.getElementById('expDesc').value || '').trim();
  if (!category) { toast('Select a category', 'error'); return; }
  if (isNaN(amount) || amount <= 0) { toast('Enter a valid amount', 'error'); return; }
  if (amount > 500000) { toast('Amount exceeds ₹5,00,000 limit', 'error'); return; }

  const isTax = category === 'Local Sales Tax (Bill)';
  const isGST = category === 'GST — Lube / Lubricants';
  const meta  = {};

  if (isTax) {
    meta.taxType = 'local_sales_tax';
    meta.fuelTaxBreakdown = {};
    ['petrol','diesel','premium_petrol'].forEach(f => {
      const chk = document.getElementById('taxChk_' + f);
      if (!chk?.checked) return;
      const sale = parseFloat(document.getElementById('taxSale_' + f)?.value) || 0;
      const rate = parseFloat(document.getElementById('taxRate_' + f)?.value) || 0;
      if (sale > 0) meta.fuelTaxBreakdown[f] = { sale, rate, tax: sale * rate / 100 };
    });
    const fuelsOnBill = Object.keys(meta.fuelTaxBreakdown).map(f =>
      ({ petrol: 'Petrol', diesel: 'Diesel', premium_petrol: 'Premium' })[f]
    ).join(' + ');
    meta.billFuels = fuelsOnBill;
  }

  if (isGST) {
    meta.taxType = 'gst';
    meta.invoiceValue = parseFloat(document.getElementById('expGSTInvoice')?.value) || 0;
    const rateSel = document.getElementById('expGSTRate')?.value;
    meta.gstRate  = rateSel === 'custom' ? parseFloat(document.getElementById('expGSTCustomRate')?.value) || 0 : parseFloat(rateSel) || 0;
    meta.cgst = amount / 2;
    meta.sgst = amount / 2;
  }

  const autoDesc = isTax
    ? ('Local Sales Tax' + (meta.billFuels ? ' — ' + meta.billFuels : ''))
    : isGST ? 'GST on Lube Purchase' : category;
  const finalDesc = desc || autoDesc;

  const expense = { id: Date.now(), date: today(), category: sanitize(category), amount, desc: sanitize(finalDesc), ...meta };
  APP.data.expenses.unshift(expense);
  try { await db.add('expenses', expense); } catch(e) { console.warn('[Expense]', e.message); }
  auditLog('expense_add', { category, amount, desc: finalDesc });
  closeModal();
  toast('✅ ' + sanitize(category) + ': ' + cur(amount) + ' saved', 'success');
  renderPage();
}

function checkDensityFlag() {
  const fuelType = document.getElementById('purchFuel')?.value;
  const density  = parseFloat(document.getElementById('purchDensity')?.value);
  const flagEl   = document.getElementById('purchDensityFlag');
  if (!flagEl || isNaN(density)) { if(flagEl) flagEl.textContent=''; return; }
  const ranges = { petrol:{min:0.720,max:0.775}, diesel:{min:0.820,max:0.860}, premium_petrol:{min:0.720,max:0.775} };
  const r = ranges[fuelType];
  if (!r) { flagEl.textContent=''; return; }
  if (density < r.min || density > r.max) {
    flagEl.innerHTML = `<span style="color:var(--red);font-weight:700">⚠️ Outside IS-1460 range (${r.min}–${r.max} kg/L) — possible adulteration</span>`;
  } else {
    flagEl.innerHTML = `<span style="color:var(--green);font-weight:700">✅ Within IS-1460 standard range</span>`;
  }
}
window.checkDensityFlag = checkDensityFlag;

function purchFuelChanged() {
  const fuelType = document.getElementById('purchFuel')?.value;

  const taxPctEl = document.getElementById('purchTaxPct');
  const taxLabelEl = document.getElementById('purchTaxLabel');

function calcPurchTotal() {
  const qty      = parseFloat(document.getElementById('purchQty')?.value);
  const basicKL  = parseFloat(document.getElementById('purchBasicKL')?.value);
  const taxPct   = parseFloat(document.getElementById('purchTaxPct')?.value) || 0;
  const prev     = document.getElementById('purchTotalPreview');
  if (!prev) return;
  if (!isNaN(qty) && qty > 0 && !isNaN(basicKL) && basicKL > 0) {
    const basicPerL  = basicKL / 1000;
    const taxPerL    = basicPerL * (taxPct / 100);
    const effRate    = basicPerL + taxPerL;
    const total      = qty * effRate;
    const fmt2 = v => '₹' + v.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 3 });
    document.getElementById('purchBasicPerL').textContent  = fmt2(basicPerL);
    document.getElementById('purchTaxPerL').textContent    = fmt2(taxPerL) + (taxPct ? ' (' + taxPct + '%)' : '');
    document.getElementById('purchEffRate').textContent    = fmt2(effRate);
    document.getElementById('purchTotalAmt').textContent   = '₹' + total.toLocaleString('en-IN', { maximumFractionDigits: 2 });
    document.getElementById('purchTotalFml').textContent   = qty.toLocaleString('en-IN') + ' L × ₹' + effRate.toFixed(3) + '/L';
    prev.style.display = '';
  } else {
    prev.style.display = 'none';
  }
}

async function savePurchase() {
  const fuelType  = document.getElementById('purchFuel').value;
  const liters    = parseFloat(document.getElementById('purchQty').value);
  const basicKL   = parseFloat(document.getElementById('purchBasicKL')?.value);
  const taxPct    = parseFloat(document.getElementById('purchTaxPct')?.value) || 0;
  const invoice   = (document.getElementById('purchInvoice')?.value || '').trim();
  const supplier  = sanitize((document.getElementById('purchSupplier')?.value || '').trim());
  const taxName   = document.getElementById('purchTaxLabel')?.textContent || 'Tax';
  const validFuels = FUEL_TYPES.map(f => f.id);
  if (!fuelType || !validFuels.includes(fuelType)) { toast('Select a valid fuel type', 'error'); return; }
  if (isNaN(liters) || liters <= 0) { toast('Enter quantity in litres', 'error'); return; }
  if (liters > 50000) { toast('Purchase cannot exceed 50,000 litres', 'error'); return; }
  if (isNaN(basicKL) || basicKL <= 0) { toast('Enter basic price per KL from invoice', 'error'); return; }
  // Calculate effective rate: basicKL/1000 × (1 + taxPct/100)
  const basicPerL = basicKL / 1000;
  const taxPerL   = basicPerL * (taxPct / 100);
  const rate      = Math.round((basicPerL + taxPerL) * 1000) / 1000;
  const total     = Math.round(liters * rate * 100) / 100;
  const density   = parseFloat(document.getElementById('purchDensity')?.value) || null;
  const purchase  = {
    id: Date.now(), date: today(), fuelType, liters,
    basicRate: basicKL,   // per KL — from invoice
    taxName,              // e.g. "ZLST"
    taxPct,               // e.g. 29.84
    rate,                 // effective per-litre rate
    total,
    density,              // kg/L — IS-1460 check
    invoice: sanitize(invoice), supplier
  };
  APP.data.fuelPurchases.unshift(purchase);
  const fuelInfo = getFuel(fuelType);
  const expEntry = {
    id: Date.now() + 1, date: today(), category: 'Fuel Purchase',
    desc: `${fuelInfo.short} — ${fmt(liters)}L @ ₹${rate}/L${invoice ? ' · ' + sanitize(invoice) : ''}`,
    amount: total, source: 'fuel_purchase', purchaseId: purchase.id,
  };
  if (!APP.data.expenses) APP.data.expenses = [];
  APP.data.expenses.unshift(expEntry);
  try { await db.add('fuelPurchases', purchase); } catch(e) { console.warn('[Purchase]', e.message); }
  try { await db.add('expenses', expEntry); } catch(e) { console.warn('[Expense]', e.message); }
  const tank = APP.data.tanks.find(t => (t.fuelType || t.fuel_type) === fuelType);
  if (tank) {
    tank.current = Math.min(parseInt(tank.capacity) || 0, (parseFloat(tank.current) || 0) + liters);
    tank.lastDip = today();
    try {
      await db.put('tanks', _tankForPut(tank));
      const freshTanks = await db.getAll('tanks');
      if (freshTanks && freshTanks.length) APP.data.tanks = freshTanks.map(_normTank);
    } catch(e) { console.warn('[Tank purchase update]', e.message); }
  } else {
    console.warn('[Purchase] No tank found for fuelType:', fuelType, '— tanks:', APP.data.tanks.map(t => t.fuelType));
  }
  // ── Auto-update purchase price (COGS) from this fuel entry ──
  if (!APP.data.purchasePrices) APP.data.purchasePrices = {};
  APP.data.purchasePrices[fuelType] = rate;
  db.setSetting('purchasePrices', APP.data.purchasePrices).catch(() => {});

  auditLog('purchase_add', { fuelType, liters, rate, total, invoice });
  closeModal();
  toast(`✅ ${fmt(liters)}L ${fuelInfo.short} purchased — ₹${cur(total)} added to expenses`, 'success');
  renderPage();
}

// ── Per-nozzle reading modal ─────────────────────────────────
function _nozzleLabels(pump) {
  return pump.nozzleLabels || (pump.nozzles === 1 ? ['A'] : pump.nozzles === 2 ? ['A','B'] : ['A','B','C'].slice(0, pump.nozzles));
}
function _nozzleFuelType(pump, nozzle) {
  return (pump.nozzleFuels || {})[nozzle] || pump.fuelType;
}
// Per-nozzle reading stored as pump.nozzleReadings = { A: number, B: number }
function _nozzleReading(pump, nozzle) {
  return (pump.nozzleReadings || {})[nozzle] ?? pump.currentReading ?? 0;
}

function openReadingModal(pumpId) {
  const pump = APP.data.pumps.find(p => String(p.id) === String(pumpId));
  if (!pump) return;

          <div>
            <div style="font-size:12px;font-weight:700;color:var(--text-0)">Nozzle ${n}</div>

              ${tankStock}
            </div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;color:var(--text-3)">Current reading</div>
          <div style="font-size:16px;font-weight:800;color:var(--text-0);font-family:var(--mono)">${fmt(cur)}</div>
        </div>
      </div>
      <!-- New reading input -->
      <input class="form-input" type="number" step="0.1" id="nozzleReading_${n}"
        placeholder="New meter reading" value=""
        oninput="updateNozzlePreview(${pumpId},'${n}')"
        style="font-size:18px;font-weight:700;text-align:center;margin-bottom:6px" />
      <!-- Live deduct preview -->
      <div id="nozzlePreview_${n}" style="display:none;font-size:11px;padding:6px 10px;border-radius:6px;font-weight:600"></div>
    </div>`;
  }).join('');

  openModal(`⛽ Update ${pump.name} — Per Nozzle`,
    `<div style="font-size:11px;color:var(--text-3);margin-bottom:14px">Enter the new meter reading for each nozzle. Sold liters will be deducted from the corresponding fuel tank automatically.</div>
     ${nozzleRows}`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-accent" onclick="saveReading(${pumpId})">💾 Save All & Sync Tanks</button>`
  );

function updateNozzlePreview(pumpId, nozzle) {
  const pump = APP.data.pumps.find(p => String(p.id) === String(pumpId));
  if (!pump) return;
  const cur     = _nozzleReading(pump, nozzle);
  const newVal  = parseFloat(document.getElementById(`nozzleReading_${nozzle}`)?.value);
  const preview = document.getElementById(`nozzlePreview_${nozzle}`);
  if (!preview) return;

  if (isNaN(newVal)) { preview.style.display = 'none'; return; }
  const sold = newVal - cur;
  const ft   = _nozzleFuelType(pump, nozzle);
  const fuel = getFuel(ft);
  const tank = APP.data.tanks.find(t => t.fuelType === ft);

  if (sold < 0) {
    preview.style.display = '';
    preview.style.background = 'rgba(239,68,68,0.08)';
    preview.style.color = 'var(--red)';
    preview.textContent = '⚠️ Cannot be less than current reading';
  } else if (sold === 0) {
    preview.style.display = 'none';
  } else {
    const overDraw = tank && sold > tank.current;
    preview.style.display = '';
    preview.style.background = overDraw ? 'rgba(239,68,68,0.08)' : 'rgba(34,197,94,0.08)';
    preview.style.color = overDraw ? 'var(--red)' : 'var(--green)';
    preview.innerHTML = `⛽ ${fmt(sold)} L ${fuel.short} will be deducted from tank` +
      (tank ? ` (${fmt(tank.current)} L → ${fmt(Math.max(0, tank.current - sold))} L)` : '') +
      (overDraw ? ' — ⚠️ exceeds stock!' : '');
  }
}

function saveReading(pumpId) {
  const pump = APP.data.pumps.find(p => String(p.id) === String(pumpId));
  if (!pump) { toast('Pump not found', 'error'); return; }
  const labels = _nozzleLabels(pump);
  const nozzleReadings = pump.nozzleReadings ? { ...pump.nozzleReadings } : {};

  let totalSold = 0;
  const deductions = {}; // fuelType -> liters
  const auditLines = [];

  for (const n of labels) {
    const inputEl = document.getElementById(`nozzleReading_${n}`);
    const rawVal  = inputEl?.value;
    if (!rawVal && rawVal !== '0') continue; // skip blanks — nozzle not updated this time

    const newReading = parseFloat(rawVal);
    const oldReading = _nozzleReading(pump, n);
    const ft         = _nozzleFuelType(pump, n);

    if (isNaN(newReading) || newReading < 0) { toast(`Nozzle ${n}: Invalid reading`, 'error'); return; }
    if (newReading < oldReading)             { toast(`Nozzle ${n}: Cannot be less than current (${fmt(oldReading)})`, 'error'); return; }
    if (newReading - oldReading > 10000)     { toast(`Nozzle ${n}: Jump >10000L — verify reading`, 'error'); return; }

    const sold = newReading - oldReading;
    nozzleReadings[n] = newReading;
    if (sold > 0) deductions[ft] = (deductions[ft] || 0) + sold;
    totalSold += sold;
    auditLines.push(`N${n}(${ft}): ${fmt(oldReading)}→${fmt(newReading)} sold ${fmt(sold)}L`);
  }

  if (!Object.keys(deductions).length && !auditLines.length) {
    toast('No readings entered', 'info'); return;
  }

  // Update pump — store per-nozzle readings + update cumulative currentReading
  // Save nozzleOpen (opening reading) if not yet set — used for sold calculation
  if (!pump.nozzleOpen) pump.nozzleOpen = {};
  labels.forEach(n => {
    if (pump.nozzleOpen[n] === undefined && nozzleReadings[n] !== undefined) {
      // First time setting this nozzle — use previous reading as open
      pump.nozzleOpen[n] = pump.nozzleReadings?.[n] ?? 0;
    }
  });
  pump.nozzleReadings  = nozzleReadings;
  pump.currentReading  = Object.values(nozzleReadings).reduce((a, v) => a + v, 0);
  pump.openReading     = Object.values(pump.nozzleOpen || {}).reduce((a, v) => a + (parseFloat(v)||0), 0);
  db.put('pumps', _pumpForPut(pump)).catch(() => {});

  // Deduct from each fuel tank
  const msgs = [];
  for (const [ft, liters] of Object.entries(deductions)) {
    const tank = APP.data.tanks.find(t => t.fuelType === ft);
    if (tank && liters > 0) {
      const before = tank.current;
      tank.current = Math.max(0, tank.current - liters);
      db.put('tanks', _tankForPut(tank)).catch(() => {});
      msgs.push(`${getFuel(ft).short}: −${fmt(liters)}L → ${fmt(tank.current)}L left`);
      if (tank.current < before * 0.15 && before > 0)
        toast(`⚠️ ${getFuel(ft).short} tank critically low: ${fmt(tank.current)} L`, 'warning');
    }
  }

  auditLog('reading_update', { pump: pump.name, pumpId, detail: auditLines.join('; '), totalSold });
  closeModal();
  toast(`✅ ${pump.name} updated — ${msgs.join(' · ')}`, 'success');
  renderPage();
}

async function savePayment(customerId) {
  const amount = parseFloat(document.getElementById('payAmount').value);
  const mode = document.getElementById('payMode').value;
  if (isNaN(amount) || amount <= 0) { toast('Enter valid payment amount', 'error'); return; }
  if (amount > 1000000) { toast('Amount exceeds ₹10,00,000 limit', 'error'); return; }
  const c = APP.data.creditCustomers.find(x => parseInt(x.id) === parseInt(customerId));
  if (!c) return;
  if (amount > c.outstanding) { toast('Payment exceeds outstanding amount ₹' + fmt(c.outstanding), 'error'); return; }
  const oldOutstanding = c.outstanding;
  c.outstanding = Math.max(0, c.outstanding - amount);
  c.lastPayment = today();
  try { await db.put('creditCustomers', c); } catch(e) { console.warn('[Payment]', e.message); }
  auditLog('credit_payment', { customer: c.name, amount, mode, oldOutstanding, newOutstanding: c.outstanding });
  closeModal();
  toast(`Payment of ${cur(amount)} recorded for ${sanitize(c.name)}`, 'success');
  renderPage();
}

// ── Razorpay SDK loader ──
function loadRazorpaySDK() {
  return new Promise((resolve, reject) => {
    if (window.Razorpay) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://checkout.razorpay.com/v1/checkout.js';
    s.onload = resolve;
    s.onerror = () => reject(new Error('Razorpay SDK failed to load'));
    document.head.appendChild(s);
  });
}

function openUPIIntent(app, amount, ref) {
  const vpa   = APP.data.upiVPA  || '';
  const name  = APP.data.upiName || 'Fuel Station';
  if (!vpa) { toast('Set UPI VPA in Settings first', 'error'); return; }
  const upiStr = `upi://pay?pa=${encodeURIComponent(vpa)}&pn=${encodeURIComponent(name)}&am=${amount}&tn=${encodeURIComponent('Fuel ' + ref)}&cu=INR`;
  // Intent URLs for specific apps
  const intents = {
    'GPay':    `tez://upi/pay?pa=${encodeURIComponent(vpa)}&pn=${encodeURIComponent(name)}&am=${amount}&tn=${encodeURIComponent('Fuel ' + ref)}&cu=INR`,
    'PhonePe': `phonepe://pay?pa=${encodeURIComponent(vpa)}&pn=${encodeURIComponent(name)}&am=${amount}&tn=${encodeURIComponent('Fuel ' + ref)}&cu=INR`,
    'Paytm':   `paytmmp://pay?pa=${encodeURIComponent(vpa)}&pn=${encodeURIComponent(name)}&am=${amount}&tn=${encodeURIComponent('Fuel ' + ref)}&cu=INR`,
    'BHIM':    `upi://pay?pa=${encodeURIComponent(vpa)}&pn=${encodeURIComponent(name)}&am=${amount}&tn=${encodeURIComponent('Fuel ' + ref)}&cu=INR`,
  };
  window.location.href = intents[app] || upiStr;
  // Show confirmation prompt after 3 seconds
  setTimeout(() => {

      document.getElementById('upiTxnId').placeholder = 'Enter UTR from ' + app + ' notification';
      document.getElementById('upiTxnId').focus();

// ── Razorpay Integration ──
async function payViaRazorpay(amount, fuelType, liters, ref) {
  const key = APP.data.razorpayKey || '';
  if (!key) { toast('Add Razorpay Key ID in Settings', 'error'); return; }
  try {
    await loadRazorpaySDK();
  } catch(e) {
    toast('Could not load Razorpay. Check internet.', 'error'); return;
  }
  const rzp = new window.Razorpay({
    key,
    amount: Math.round(amount * 100), // paise
    currency: 'INR',
    name: APP.data.upiName || APP.tenant?.name || 'Fuel Station',
    description: `${getFuel(fuelType).name}${liters ? ' · ' + liters.toFixed(2) + 'L' : ''}`,
    notes: { ref, fuelType, liters },
    method: { upi: true, card: true, netbanking: true, wallet: false },
    prefill: { method: 'upi' },
    theme: { color: '#d4940f' },
    handler: function(response) {
      // Payment confirmed by Razorpay
      const txnId = response.razorpay_payment_id;
      toast(`✅ Payment confirmed! ID: ${txnId}`, 'success');
      if (window._upiPayCallback) {
        window._upiPayCallback(txnId);
        window._upiPayCallback = null;
      }
      closeModal();
    },
    modal: {
      ondismiss: function() {
        toast('Payment cancelled', 'info');
      }
    }
  });
  rzp.open();
}

// Called from the main sale modal when mode === 'upi'
function recordSaleWithUPI(saleData) {
  openUPIPaymentModal(saleData.amount, saleData.fuelType, saleData.liters, (txnId) => {
    saleData.upiTxnId = txnId;
    saleData.mode = 'upi';
    // Save the sale
    APP.data.sales.unshift(saleData);
    db.add('sales', saleData).catch(() => {});
    const tank = APP.data.tanks.find(t => t.fuelType === saleData.fuelType);
    if (tank && saleData.liters) { tank.current = Math.max(0, tank.current - saleData.liters); db.put('tanks', _tankForPut(tank)).catch(() => {}); }
    auditLog('sale_add', { ...saleData, note: 'UPI payment' + (txnId ? ' UTR:' + txnId : '') });
    toast(`Sale ₹${saleData.amount.toLocaleString('en-IN')} recorded via UPI`, 'success');
    renderPage();
  });
}

function savePrices() {
  const changes = [];
  let valid = true;
  FUEL_TYPES.forEach(f => {
    const el = document.getElementById('price_' + f.id);
    if (!el) return;
    const newSell = parseFloat(el.value);
    if (isNaN(newSell) || newSell <= 0 || newSell > 500) { toast('Invalid price for ' + f.short + ': must be ₹0.01–500', 'error'); valid = false; return; }
    if (newSell !== APP.data.prices[f.id]) {
      changes.push({ fuel: f.short, oldSell: APP.data.prices[f.id], newSell });
    }
    APP.data.prices[f.id] = newSell;
  });
  if (!valid) return;
  db.setSetting('prices', APP.data.prices);
  if (changes.length > 0) auditLog('price_change', { changes });
  closeModal();
  toast('Fuel prices updated', 'success');
  renderPage();
}

  const dk = date + '_' + allocShift;

  allocations[dk][`${String(pumpId)}_${nozzle}`] = empId;
  const emp = APP.data.employees.find(e => parseInt(e.id) === parseInt(empId));
  const pump = APP.data.pumps.find(p => String(p.id) === String(pumpId));
  const d = new Date(date).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
  saveAllocations();
  toast(`${emp?.name} → ${pump?.name} N${nozzle} on ${d}`, 'success');
