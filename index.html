  const logins = (APP.auditLog || []).filter(a =>
    a.action === 'login' && a.role === 'employee' && a.timestamp && a.timestamp.startsWith(thisMonth)

  D.employees.forEach(e => {

  const html = `<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Employee Shift Report - ${monthName}</title>

async function seedDatabase() {
  for (const t of SEED.tanks) await db.put('tanks', _tankForPut(t)).catch(() => {});
  for (const p of SEED.pumps) await db.put('pumps', _pumpForPut(p)).catch(() => {});
  for (const s of SEED.shifts) await db.put('shifts', s).catch(() => {});
  await db.bulkPut('employees', SEED.employees).catch(() => {});
  await db.bulkPut('sales', SEED.sales).catch(() => {});
  await db.bulkPut('creditCustomers', SEED.creditCustomers).catch(() => {});
  await db.bulkPut('expenses', SEED.expenses).catch(() => {});
  await db.bulkPut('fuelPurchases', SEED.fuelPurchases).catch(() => {});
  await db.bulkPut('dipReadings', SEED.dipReadings).catch(() => {});
  await db.setSetting('prices', SEED.prices);
  await db.setSetting('purchasePrices', SEED.purchasePrices);
  await db.setSetting('seeded', true);
}

async function loadData() {
  try {
    await db.ready;
  } catch (e) {
    console.error('IndexedDB init failed:', e);
    APP.data = { ...SEED };
    return;
  }

  if (!db.db) {
    console.warn('No DB connection, using seed data');
    APP.data = { ...SEED };
    return;
  }

  // ── PARALLEL FETCH: fire all requests simultaneously ─────────────────────
  // Previously sequential (~18 round-trips × 300ms = 6s). Now one wave.
  const [
    seeded,
    razorpayKey,
    rawTanks, rawPumps, rawShifts, rawEmployees,
    rawSales, rawCredit, rawExpenses, rawPurchases, rawDip,
    prices, purchasePrices,
    upiVPA, upiName, stationCode, omcName,
    serverAlloc, savedRoster, savedAtt,
    savedTaxRates, savedAdvances, savedBankRecon,
    waPhone, waApiKey
  ] = await Promise.all([
    db.getSetting('seeded').catch(() => null),
    db.getSetting('razorpayKey').catch(() => ''),
    db.getAll('tanks').catch(() => []),
    db.getAll('pumps').catch(() => []),
    db.getAll('shifts').catch(() => []),
    db.getAll('employees').catch(() => []),
    db.getAll('sales').catch(() => []),
    db.getAll('creditCustomers').catch(() => []),
    db.getAll('expenses').catch(() => []),
    db.getAll('fuelPurchases').catch(() => []),
    db.getAll('dipReadings').catch(() => []),
    db.getSetting('prices').catch(() => null),
    db.getSetting('purchasePrices').catch(() => null),
    db.getSetting('upiVPA').catch(() => ''),
    db.getSetting('upiName').catch(() => ''),
    db.getSetting('stationCode').catch(() => ''),
    db.getSetting('omcName').catch(() => ''),
    db.getSetting('allocations').catch(() => null),
    db.getSetting('shift_roster').catch(() => null),
    db.getSetting('attendance_data').catch(() => null),
    db.getSetting('fuelTaxRates').catch(() => null),
    db.getSetting('advances_data').catch(() => null),
    db.getSetting('bank_recon_data').catch(() => null),
    db.getSetting('waPhone').catch(() => ''),
    db.getSetting('waApiKey').catch(() => ''),
  ]);

  APP.data.razorpayKey = razorpayKey || '';
  if (!seeded) await seedDatabase().catch(() => {});

  try {
    // Derive purchasePrices from fuelPurchases if not saved
    let resolvedPurchasePrices = purchasePrices;
    if (!resolvedPurchasePrices || Object.keys(resolvedPurchasePrices).length === 0) {
      if (rawPurchases.length > 0) {
        const derived = {};
        [...rawPurchases].sort((a,b) => (b.id||0)-(a.id||0)).forEach(p => {
          if (p.fuelType && p.rate && !derived[p.fuelType]) derived[p.fuelType] = p.rate;
        });
        if (Object.keys(derived).length > 0) resolvedPurchasePrices = derived;
      }
      if (!resolvedPurchasePrices || Object.keys(resolvedPurchasePrices).length === 0)
        resolvedPurchasePrices = SEED.purchasePrices;
    }

    APP.data = {
      tanks: rawTanks.map(_normTank),
      pumps: rawPumps.map(_normPump),
      shifts: rawShifts,
      employees: rawEmployees.map(function(e) {
        if (!e.permissions && e.data_json) {
          try { const j = JSON.parse(e.data_json || '{}'); e.permissions = j.permissions || {}; } catch { e.permissions = {}; }
        }
        if (!e.permissions) e.permissions = {};
        if (e.joinDate === undefined && e.join_date) e.joinDate = e.join_date;
        if (e.color === undefined && e.data_json) {
          try { e.color = JSON.parse(e.data_json).color || ''; } catch {}
        }
        return e;
      }),
      sales: rawSales.sort((a, b) => b.id - a.id),
      creditCustomers: rawCredit.map(function(c) {
        c.outstanding = parseFloat(c.outstanding !== undefined ? c.outstanding : (c.balance || 0));
        c.limit       = parseFloat(c.limit       !== undefined ? c.limit       : (c.credit_limit || 0));
        if (!c.lastPayment) c.lastPayment = c.last_payment || '';
        if (!c.phone) c.phone = '';
        if (!c.type) c.type = 'Individual';
        return c;
      }),
      expenses: rawExpenses.sort((a, b) => b.id - a.id).map(function(e) {
        if (e.desc === undefined && e.description) e.desc = e.description;
        if (e.total === undefined) e.total = e.amount || 0;
        return e;
      }),
      fuelPurchases: rawPurchases.sort((a, b) => b.id - a.id).map(function(p) {
        if (p.total === undefined || p.total === null) p.total = p.amount || 0;
        if (!p.invoice) p.invoice = p.invoice_no || p.invoiceNo || '';
        if (!p.fuelType) p.fuelType = p.fuel_type || '';
        if (p.liters === undefined) p.liters = 0;
        if (p.rate === undefined) p.rate = 0;
        return p;
      }),
      dipReadings: rawDip.sort((a, b) => b.id - a.id).map(function(d) { if (!d.tankId && d.tank_id) d.tankId = d.tank_id; return d; }),
      prices: prices || SEED.prices,
      purchasePrices: resolvedPurchasePrices,
      weekly: [],
      upiVPA: upiVPA || SEED.upiVPA,
      upiName: upiName || SEED.upiName,
      stationCode: stationCode || '',
      omcName: omcName || '',
      waPhone: waPhone || '',
      waApiKey: waApiKey || '',
      gstin: '',
      legalName: '',
      stateCode: '29',
      loyaltyEarnRate: 1,
      loyaltyRedeemRate: 50,
      loyaltyMinRedeem: 100,
    };

    // ── Allocations ───────────────────────────────────────────────────────────
    try {
      if (serverAlloc && typeof serverAlloc === 'object' && Object.keys(serverAlloc).length > 0) {
        allocations = serverAlloc;
      }
      try {
        const todayStr = new Date().toISOString().slice(0,10);
        const todayKeys = Object.keys(allocations).filter(k =>
          k.startsWith(todayStr + '_') &&
          typeof allocations[k] === 'object' &&
          Object.values(allocations[k]).some(v => v && parseInt(v) > 0)
        );
        if (todayKeys.length > 0) {
          todayKeys.sort((a, b) =>
            Object.values(allocations[b]).filter(v => v && parseInt(v) > 0).length -
            Object.values(allocations[a]).filter(v => v && parseInt(v) > 0).length
          );
          allocShift = todayKeys[0].replace(todayStr + '_', '');
        }
      } catch {}
      if (APP.data?.pumps) {
        const validNozzleKeys = new Set();
        APP.data.pumps.forEach(p => {
          const labels = p.nozzleLabels || (p.nozzles === 1 ? ['A'] : p.nozzles === 2 ? ['A','B'] : ['A','B','C'].slice(0, p.nozzles));
          labels.forEach(n => validNozzleKeys.add(`${String(p.id)}_${n}`));
        });
        if (validNozzleKeys.size > 0) {
          let pruned = false;
          Object.keys(allocations).forEach(dk => {
            if (typeof allocations[dk] !== 'object') { delete allocations[dk]; pruned = true; return; }
            Object.keys(allocations[dk]).forEach(key => {
              if (!validNozzleKeys.has(key)) { delete allocations[dk][key]; pruned = true; }
            });
            if (Object.keys(allocations[dk]).length === 0) { delete allocations[dk]; pruned = true; }
          });
          if (pruned) saveAllocations();
        }
      }
    } catch(allocErr) {
      console.warn('[Alloc] Failed to load from server:', allocErr.message);
    }

    // ── Roster & Attendance ───────────────────────────────────────────────────
    if (savedRoster && typeof savedRoster === 'object') window._rosterData = savedRoster;
    if (savedAtt && typeof savedAtt === 'object') window._attendanceData = savedAtt;
    if (Array.isArray(savedAdvances)) window._advancesData = savedAdvances;
    if (savedBankRecon && typeof savedBankRecon === 'object') window._bankReconData = savedBankRecon;
    // Load nozzle meter log
    try {
      const savedNozzleLog = await db.getSetting('nozzle_meter_log').catch(()=>null);
      if (Array.isArray(savedNozzleLog)) window._nozzleMeterLog = savedNozzleLog;
    } catch(e) {}
    // Load lubes catalogue + sales
    try {
      const [savedLubeProds, savedLubeSales] = await Promise.all([
        db.getSetting('lubes_products').catch(()=>null),
        db.getSetting('lubes_sales').catch(()=>null),
      ]);
      if (Array.isArray(savedLubeProds)) window._lubesProducts = savedLubeProds;
      if (Array.isArray(savedLubeSales)) window._lubesSales    = savedLubeSales;
    } catch(e) {}
    // Persist WA log across sessions
    try {
      const savedWaLog = await db.getSetting('wa_log').catch(()=>null);
      if (Array.isArray(savedWaLog) && savedWaLog.length) window._waLog = savedWaLog;
    } catch(e) {}
    // Load GST settings
    try {
      const [gstin, legalName, stateCode] = await Promise.all([
        db.getSetting('gstin').catch(()=>''),
        db.getSetting('legalName').catch(()=>''),
        db.getSetting('stateCode').catch(()=>'29'),
      ]);
      if (gstin)     APP.data.gstin     = gstin;
      if (legalName) APP.data.legalName = legalName;
      if (stateCode) APP.data.stateCode = stateCode;
    } catch(e) {}
    // Load loyalty settings
    try {
      const [loyaltyEarnRate, loyaltyRedeemRate, loyaltyMinRedeem] = await Promise.all([
        db.getSetting('loyaltyEarnRate').catch(()=>1),
        db.getSetting('loyaltyRedeemRate').catch(()=>50),
        db.getSetting('loyaltyMinRedeem').catch(()=>100),
      ]);
      APP.data.loyaltyEarnRate   = loyaltyEarnRate  || 1;
      APP.data.loyaltyRedeemRate = loyaltyRedeemRate || 50;
      APP.data.loyaltyMinRedeem  = loyaltyMinRedeem  || 100;
    } catch(e) {}
    // Load payroll for current month
    try {
      const now2 = new Date();
      const pm = now2.getMonth()+1, py = now2.getFullYear();
      const savedPayrollRaw = await db.getSetting('payroll_'+py+'_'+pm).catch(()=>null);
      if (savedPayrollRaw && typeof savedPayrollRaw === 'object') window._payrollSaved = savedPayrollRaw;
    } catch(e) {}

    // ── Load Fuel Tax Rates ───────────────────────────────────────────────────
    APP.data.fuelTaxRates = (Array.isArray(savedTaxRates) && savedTaxRates.length > 0)
      ? savedTaxRates
      : [
          { fuelType: 'petrol',         taxName: 'ZLST', rate: 29.84 },
          { fuelType: 'diesel',         taxName: 'ZLST', rate: 21.17 },
          { fuelType: 'premium_petrol', taxName: 'ZLST', rate: 18.00 },
        ];

    // ── Backfill: ensure every fuel purchase has a matching expense entry ──
    // This handles purchases entered before the auto-expense feature was added
    const existingPurchaseExpIds = new Set(
      APP.data.expenses.filter(e => e.source === 'fuel_purchase').map(e => e.purchaseId)
    );
    const missingPurchases = APP.data.fuelPurchases.filter(p => !existingPurchaseExpIds.has(p.id));
    if (missingPurchases.length > 0) {
      const newExpenses = missingPurchases.map(p => {
        const fi = getFuel(p.fuelType) || { short: p.fuelType };
        return {
          id: p.id + 0.1, // stable ID derived from purchase
          date: p.date || today(),
          category: 'Fuel Purchase',
          desc: `${fi.short} — ${fmt(p.liters)}L @ ₹${p.rate}/L${p.invoice ? ' · ' + p.invoice : ''}`,
          amount: p.total || (p.liters * p.rate),
          source: 'fuel_purchase',
          purchaseId: p.id,
        };
      });
      for (const e of newExpenses) {
        APP.data.expenses.push(e);
        db.add('expenses', e).catch(() => {});
      }
      APP.data.expenses.sort((a, b) => (b.id || 0) - (a.id || 0));
    }
    // ── Write employee cache for login screen (survives logout + new sessions) ──
    try {
      const empCacheData = (APP.data.employees || []).map(function(e) {
        return { id: e.id, name: e.name, role: e.role, shift: e.shift, pinHash: e.pinHash || null, permissions: e.permissions || {} };
      });
      if (empCacheData.length > 0) {
        localStorage.setItem('fb_emp_cache', JSON.stringify(empCacheData));
      }
    } catch {}
  } catch (e) {
    console.error('Data load failed, using seed data:', e);
    APP.data = { ...SEED };
  }
}

// ── ONLINE/OFFLINE ───────────────────────────────────────────
function updateOnlineStatus() {
  const online = navigator.onLine;
  document.body.classList.toggle('is-offline', !online);
  const pill = document.getElementById('statusPill');
  if (pill) {
    pill.className = `status-pill ${online ? 'online' : 'offline'}`;
    pill.querySelector('.status-text').textContent = online ? 'Online' : 'Offline';
  }
  if (online && 'serviceWorker' in navigator && 'SyncManager' in window) {
    navigator.serviceWorker.ready.then(reg => reg.sync.register('sync-sales')).catch(() => {});
  }
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

// ── INIT ─────────────────────────────────────────────────────
function _splashProgress(pct, msg) {
  try {
    var f = document.getElementById('splash-bar-fill');
    var m = document.getElementById('splash-msg');
    if (f) f.style.width = pct + '%';
    if (m && msg) m.textContent = msg;
  } catch(e) {}
}

async function initApp() {
  _splashProgress(70, 'Initializing...');
  // Local file guard removed for standalone build

  // Check if a tenant is selected — if not, show selector screen
  _splashProgress(80, 'Loading station...');
  const _tenant = mt_getActiveTenant();
  if (!_tenant) {
    document.body.classList.add('app-ready');
    await mt_showSelector();
    return;
  }

  // Store tenant info in APP for use throughout
  APP.tenant = _tenant;

  // HTTPS redirect: REMOVED for standalone HTML build

  // Set SEED data IMMEDIATELY so app always works
  APP.data = JSON.parse(JSON.stringify(SEED));
  APP.auditLog = [];

  // Register service worker (only on deployed site)
  const isDeployed = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.hostname.endsWith('.netlify.app') || location.hostname.endsWith('.netlify.com');
  if ('serviceWorker' in navigator && isDeployed) {
    try {
      const reg = await navigator.serviceWorker.register('/sw.js?v=5.0');
      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data.type === 'SYNC_COMPLETE') toast('Data synced!', 'info');
      });
    } catch (e) { /* skip */ }
  }

  // Clock + status
  updateClock(); setInterval(updateClock, 1000); updateOnlineStatus();

  // Cross-tab sync: admin auto-refreshes tanks when employee submits in another tab
  try {
    var syncCh = new BroadcastChannel('fuelbunk_sync');
    syncCh.onmessage = function(evt) {
      if (!evt.data || evt.data.type !== 'EMP_SUBMITTED') return;
      Promise.all([db.getAll('tanks'), db.getAll('pumps'), db.getAll('sales')]).then(function(res) {
        var freshTanks = res[0], freshPumps = res[1], freshSales = res[2];
        if (freshTanks.length && APP.data) {
          APP.data.tanks = freshTanks.map(_normTank);
          APP.data.pumps = freshPumps.map(_normPump);
          if (freshSales.length) APP.data.sales = freshSales.sort(function(a,b){ return b.id - a.id; });
        }
        if (APP.role === 'admin') {
          var name = evt.data.employee || 'Employee';
          var ded = evt.data.deductions || {};
          var parts = Object.keys(ded).map(function(ft){ return getFuel(ft).short + ': ' + fmt(ded[ft]) + 'L'; });
          toast(name + ' submitted' + (parts.length ? ' — ' + parts.join(', ') + ' deducted' : ''), 'info');
          if (APP.page === 'tanks' || APP.page === 'dashboard') renderPage();
        }
      }).catch(function(){});
    };
  } catch(e) {}

  // Idle timer
  ['click','keydown','touchstart','scroll'].forEach(evt =>
    document.addEventListener(evt, resetIdleTimer, { passive: true })
  );

  // Check session
  var sessionOk = loadSession();

  if (sessionOk) {
    if (APP.role === 'employee') { emp_loadSession(); if (!empState.active) { empState.page = 'login'; } }
    // Load data WITH token now set by loadSession — ensures correct server data on every refresh
    try {
      await Promise.race([
        loadData(),
        new Promise((_, rej) => setTimeout(() => rej(new Error('DB timeout 5s')), 5000))
      ]);
    } catch (e) {
      console.warn('DB load failed, using seed:', e);
    }
    enterApp();
  } else {
    showLoginScreen();
  }
  _splashProgress(100, 'Ready!');
  document.body.classList.add('app-ready');

  // Load audit log AFTER app is visible (non-blocking, with timeout)
  setTimeout(async () => {
    try {
      if (db && db.db) {
        var logs = await Promise.race([
          db.getAll('auditLog'),
          new Promise((_, rej) => setTimeout(() => rej('timeout'), 2000))
        ]);
        APP.auditLog = logs || [];
        APP.auditLog.sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||''));
      }
    } catch { APP.auditLog = []; }
  }, 1000);

  setTimeout(() => { if (APP.data) { checkTankAlerts(APP.data.tanks); checkCreditAlerts(APP.data.creditCustomers); } }, 5000);
}

function openChangeMyPasswordModal() {
  openModal('🔑 Change My Password',
    `<div class="form-group"><label class="form-label">Current Password *</label>
       <input class="form-input" id="curPass" type="password" placeholder="Enter current password" autocomplete="current-password" />
     </div>
     <div class="form-group"><label class="form-label">New Password *</label>
       <input class="form-input" id="newPass" type="password" placeholder="Min 6 characters" autocomplete="new-password" />
     </div>
     <div class="form-group"><label class="form-label">Confirm New Password *</label>
       <input class="form-input" id="confPass" type="password" placeholder="Re-enter new password" />
     </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-accent" onclick="saveMyPassword()">🔑 Update Password</button>`
  );
}

async function saveMyPassword() {
  const curPass = document.getElementById('curPass')?.value || '';
  const newPass = document.getElementById('newPass')?.value || '';
  const confPass = document.getElementById('confPass')?.value || '';
  if (!curPass) { toast('Enter current password', 'error'); return; }
  if (!newPass || newPass.length < 6) { toast('New password must be at least 6 characters', 'error'); return; }
  if (newPass !== confPass) { toast('Passwords do not match', 'error'); return; }
  try {
    // Try API call first (bridge.js overrides this for server auth)
    if (typeof AuthAPI !== 'undefined') {
      await AuthAPI.changePassword(newPass);
      closeModal();
      toast('Password updated successfully', 'success');
    } else {
      toast('Password change not available in offline mode', 'error');
    }
  } catch(e) {
    toast(e.message || 'Failed to update password', 'error');
  }
}

function openResetEmployeePasswordModal(empId) {
  const emp = APP.data.employees.find(e => parseInt(e.id) === parseInt(empId));
  if (!emp) return;
  openModal(`🔑 Reset PIN — ${sanitize(emp.name)}`,
    `<div style="margin-bottom:12px;font-size:12px;color:var(--text-2);padding:10px;background:var(--bg-0);border-radius:8px">
       Reset the 4-digit login PIN for <strong style="color:var(--accent-light)">${sanitize(emp.name)}</strong>.
     </div>
     <div class="form-group"><label class="form-label">New 4-Digit PIN *</label>
       <input class="form-input mono" id="newEmpPIN" type="password" inputmode="numeric" maxlength="4" placeholder="••••" style="font-size:24px;letter-spacing:8px;text-align:center" />
     </div>
     <div class="form-group"><label class="form-label">Confirm PIN *</label>
       <input class="form-input mono" id="confEmpPIN" type="password" inputmode="numeric" maxlength="4" placeholder="••••" style="font-size:24px;letter-spacing:8px;text-align:center" />
     </div>
     <input type="hidden" id="resetEmpId" value="${empId}" />`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-accent" onclick="doResetEmployeePin()">🔑 Reset PIN</button>`
  );
  // Fix (e): auto-focus the new PIN input
  requestAnimationFrame(() => { const el = document.getElementById('newEmpPIN'); if (el) el.focus(); });
}

async function doResetEmployeePin() {
  const empId = parseInt(document.getElementById('resetEmpId')?.value);
  const pin = document.getElementById('newEmpPIN')?.value?.trim();
  const conf = document.getElementById('confEmpPIN')?.value?.trim();
  if (!pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) { toast('PIN must be exactly 4 digits', 'error'); return; }
  if (pin !== conf) { toast('PINs do not match', 'error'); return; }
  const emp = APP.data.employees.find(e => parseInt(e.id) === parseInt(empId));
  if (!emp) { toast('Employee not found', 'error'); return; }
  try {
    const hash = await sha256(pin);
    emp.pinHash = hash;
    await db.put('employees', emp);
    const pins = loadEmpPins();
    pins[empId] = hash;
    saveEmpPins(pins);
    closeModal();
    toast(`PIN reset for ${emp.name}`, 'success');
    renderPage();
  } catch(e) {
    toast('Failed to reset PIN: ' + (e.message||e), 'error');
  }
}

       <input class="form-input" id="newAdminPass" type="password" placeholder="Enter new password" autocomplete="new-password" />
     </div>
     <div class="form-group"><label class="form-label">Confirm Password *</label>
       <input class="form-input" id="confirmAdminPass" type="password" placeholder="Confirm password" />
     </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-accent" onclick="saveAdminPassword()">🔑 Update Password</button>`

}

async function saveAdminPassword() {
  const idx  = parseInt(document.getElementById('adminUserIdx')?.value);
  const pass = document.getElementById('newAdminPass')?.value;
  const conf = document.getElementById('confirmAdminPass')?.value;
  if (!pass || pass.length < 6) { toast('Password must be at least 6 characters', 'error'); return; }
  if (pass !== conf) { toast('Passwords do not match', 'error'); return; }
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
  const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  const tenants = mt_getTenants();
  const tIdx = tenants.findIndex(t => t.id === APP.tenant?.id);
  if (tIdx === -1) { toast('Tenant not found', 'error'); return; }
  tenants[tIdx].adminUsers[idx].passHash = hash;
  mt_saveTenants(tenants);
  mt_setActiveTenant(tenants[tIdx]);
  // Update in-memory ADMIN_USERS
  ADMIN_USERS[idx].passHash = hash;
  APP.tenant = tenants[tIdx];
  closeModal();
  toast('Password updated', 'success');
}

async function saveNewAdminUser() {
  const name = document.getElementById('newAdminName')?.value?.trim();
  const username = document.getElementById('newAdminUsername')?.value?.trim()?.toLowerCase();
  const role = document.getElementById('newAdminRole')?.value;
  const pass = document.getElementById('newAdminPass2')?.value;
  if (!name || name.length < 2) { toast('Enter a name', 'error'); return; }
  if (!username || username.length < 2) { toast('Enter a username', 'error'); return; }
  if (!pass || pass.length < 6) { toast('Password must be at least 6 characters', 'error'); return; }
  const tenants = mt_getTenants();
  const tIdx = tenants.findIndex(t => t.id === APP.tenant?.id);
  if (tIdx === -1) { toast('Tenant not found', 'error'); return; }
  if ((tenants[tIdx].adminUsers||[]).find(u => u.username === username)) {
    toast('Username already exists', 'error'); return;
  }
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
  const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  const newUser = { id: Date.now(), name, username, passHash: hash, role };
  tenants[tIdx].adminUsers = [...(tenants[tIdx].adminUsers||[]), newUser];
  mt_saveTenants(tenants);
  mt_setActiveTenant(tenants[tIdx]);
  ADMIN_USERS.push(newUser);
  APP.tenant = tenants[tIdx];
  closeModal();
  toast(`${name} added as admin`, 'success');
  renderPage();
}
